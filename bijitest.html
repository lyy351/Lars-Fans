<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人档案库 - 书籍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #6b7b76;
            color: #f7e8c8;
            padding: 20px;
            min-height: 100vh;
            background-image: repeating-linear-gradient(
                0deg,
                rgba(255,255,255,0.03) 0px,
                rgba(255,255,255,0.03) 1px,
                transparent 1px,
                transparent 4px
            );
            zoom: 1.2;  /* 整体放大1.2倍 */
        }
        .book-page {
            max-width: 400px;
            margin: 0 auto;
            min-height: 900px;
            position: relative;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            padding-top: 10px;
        }
        .header-count {
            font-size: 48px;
            font-weight: 600;
            line-height: 1;
        }
        .header-label {
            font-size: 16px;
            opacity: 0.8;
            margin-left: 4px;
        }
        .header-label small {
            display: block;
            font-size: 12px;
            opacity: 0.6;
        }
        .header-icons {
            display: flex;
            gap: 24px;
        }
        .header-icon {
            width: 24px;
            height: 24px;
            stroke: #f7e8c8;
            stroke-width: 2;
            fill: none;
        }

        /* 时间轴 */
        .timeline-container {
            position: relative;
        }
        .timeline-line {
            position: absolute;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: rgba(247, 232, 200, 0.3);
        }
        .timeline-item {
            display: flex;
            margin-bottom: 28px;
            position: relative;
        }
        .timeline-time {
            width: 100px;
            font-size: 22px;
            font-weight: 500;
            padding-top: 4px;
        }
        .timeline-time small {
            display: block;
            font-size: 14px;
            opacity: 0.7;
            margin-top: 2px;
        }

        /* 条目栏：固定宽高比 1657:581 */
        .timeline-content {
            flex: 1;
            position: relative;
            background-color: #596863;
            background-image: url('https://s41.ax1x.com/2026/03/27/pelZawR.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            background-blend-mode: overlay;
            border-radius: 8px;
            aspect-ratio: 1657 / 581;
            overflow: hidden;
        }

        /* 封面容器：宽占条目栏宽度的 468/1657，高 100% */
        .cover-container {
            position: absolute;
            left: 0;
            top: 0;
            width: calc(468 / 1657 * 100%);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 封面图片：宽为容器宽度的 358/468，高度自动，保持比例 358:468 */
        .timeline-cover {
            width: calc(358 / 468 * 100%);
            height: auto;
            object-fit: contain;
            border-radius: 6px;
            border: 1px solid rgba(247, 232, 200, 0.3);
        }

        /* 文字容器：右侧剩余宽度，高度 100%，flex 垂直分布 */
        .timeline-text {
            position: absolute;
            left: calc(468 / 1657 * 100%);
            top: 0;
            width: calc(100% - (468 / 1657 * 100%));
            height: 100%;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 书名：字号16px，无书名号 */
        .timeline-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        /* 第二行：作者 | 类型 | 标签，样式与之前作者行一致 */
        .timeline-author {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 8px;
            flex: 1;
            overflow-y: auto;
            line-height: 1.4;
        }

        .timeline-stars {
            font-size: 13px;
            color: #f7e8c8;
            margin-top: auto;
        }

        /* 小屏幕适配 */
        @media (max-width: 480px) {
            .timeline-title {
                font-size: 13px;
            }
            .timeline-author {
                font-size: 10px;
            }
            .timeline-stars {
                font-size: 11px;
            }
        }

        /* 底部栏 */
        .page-footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .footer-back {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-back svg {
            width: 24px;
            height: 24px;
            stroke: #f7e8c8;
            stroke-width: 2;
            fill: none;
        }
        .footer-search {
            flex: 1;
            height: 48px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(247, 232, 200, 0.6);
            font-size: 18px;
        }
        .footer-add {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #f7e8c8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-add svg {
            width: 24px;
            height: 24px;
            stroke: #6b7b76;
            stroke-width: 3;
            fill: none;
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap');
    </style>
</head>
<body>
    <div class="book-page">
        <div class="page-header">
            <div>
                <span class="header-count">21</span>
                <span class="header-label">本<small>BOOK</small></span>
            </div>
            <div class="header-icons">
                <svg class="header-icon" viewBox="0 0 24 24">
                    <path d="M3 4h18v2H3V4zm0 5h18v2H3V9zm0 5h12v2H3v-2z"/>
                </svg>
                <svg class="header-icon" viewBox="0 0 24 24">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            </div>
        </div>

        <div class="timeline-container">
            <div class="timeline-line"></div>

            <!-- 条目1：书名去书名号，第二行改为“作者 | 类型 | 标签”格式 -->
            <div class="timeline-item">
                <div class="timeline-time">09.21<small>2025</small></div>
                <div class="timeline-content">
                    <div class="cover-container">
                        <img src="https://picsum.photos/id/237/100/140" class="timeline-cover">
                    </div>
                    <div class="timeline-text">
                        <div class="timeline-title">哭吧，祈求也没关系</div>
                        <div class="timeline-author">韩国 | 文学 | 治愈</div>
                        <div class="timeline-stars">★★★★★</div>
                    </div>
                </div>
            </div>

            <!-- 条目2 -->
            <div class="timeline-item">
                <div class="timeline-time">11.28<small>2024</small></div>
                <div class="timeline-content">
                    <div class="cover-container">
                        <img src="https://picsum.photos/id/1/100/140" class="timeline-cover">
                    </div>
                    <div class="timeline-text">
                        <div class="timeline-title">拯救美强惨反派</div>
                        <div class="timeline-author">云梦江舟 | 小说 | 穿书 | 仙侠</div>
                        <div class="timeline-stars">★★★★☆</div>
                    </div>
                </div>
            </div>

            <!-- 条目3 -->
            <div class="timeline-item">
                <div class="timeline-time">11.24<small>2024</small></div>
                <div class="timeline-content">
                    <div class="cover-container">
                        <img src="https://picsum.photos/id/25/100/140" class="timeline-cover">
                    </div>
                    <div class="timeline-text">
                        <div class="timeline-title">魔鬼的体温</div>
                        <div class="timeline-author">藤萝为枝 | 言情 | 暗恋 | 治愈</div>
                        <div class="timeline-stars">★★★★★</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="page-footer">
            <div class="footer-back">
                <svg viewBox="0 0 24 24"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
            </div>
            <div class="footer-search">搜索记录</div>
            <div class="footer-add">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            </div>
        </div>
    </div>
</body>
</html>
