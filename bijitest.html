<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫游时间轴 - 书影有鉴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #9d8ca0; /* 与原图一致的紫色背景 */
            color: #f7e8c8; /* 金色文字 */
            padding: 20px;
            min-height: 100vh;
        }
        .timeline-page {
            max-width: 400px;
            margin: 0 auto;
            background-color: #9d8ca0;
            border-radius: 24px;
            padding: 20px;
            min-height: 800px;
            position: relative;
        }
        /* 顶部栏 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header-date {
            font-size: 48px;
            font-weight: 600;
            line-height: 1;
        }
        .header-week {
            font-size: 12px;
            opacity: 0.7;
            margin-left: 4px;
        }
        .header-icons {
            display: flex;
            gap: 24px;
        }
        .header-icon {
            width: 24px;
            height: 24px;
            stroke: #f7e8c8;
            stroke-width: 2;
            fill: none;
        }
        /* 时间轴容器 */
        .timeline-container {
            position: relative;
        }
        /* 时间轴竖线 */
        .timeline-line {
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: rgba(247, 232, 200, 0.3);
        }
        /* 时间轴项 */
        .timeline-item {
            display: flex;
            margin-bottom: 24px;
            position: relative;
        }
        .timeline-time {
            width: 80px;
            font-size: 20px;
            font-weight: 500;
            padding-top: 4px;
        }
        .timeline-time small {
            display: block;
            font-size: 10px;
            opacity: 0.6;
            margin-top: 2px;
        }
        .timeline-content {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .timeline-info {
            flex: 1;
        }
        .timeline-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .timeline-desc {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 12px;
        }
        .timeline-stars {
            font-size: 14px;
            color: #f7e8c8;
        }
        .timeline-cover {
            width: 80px;
            height: 112px;
            border-radius: 4px;
            object-fit: cover;
            margin-left: 12px;
        }
        /* 引入字体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap');
    </style>
</head>
<body>
    <div class="timeline-page">
        <!-- 顶部栏 -->
        <div class="page-header">
            <div>
                <span class="header-date">19</span>
                <span class="header-week">星期四</span>
            </div>
            <div class="header-icons">
                <svg class="header-icon" viewBox="0 0 24 24">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
                <svg class="header-icon" viewBox="0 0 24 24">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            </div>
        </div>

        <!-- 时间轴 -->
        <div class="timeline-container">
            <div class="timeline-line"></div>

            <!-- 哈尔的移动城堡 -->
            <div class="timeline-item">
                <div class="timeline-time">
                    08.16
                    <small>周日</small>
                </div>
                <div class="timeline-content">
                    <div class="timeline-info">
                        <div class="timeline-title">哈尔的移动城堡</div>
                        <div class="timeline-desc">宫崎骏 | 动画 | 奇幻 | 冒险</div>
                        <div class="timeline-stars">★★★★☆</div>
                    </div>
                    <img src="https://picsum.photos/id/237/80/112" class="timeline-cover" alt="哈尔的移动城堡">
                </div>
            </div>

            <!-- 流浪地球2 -->
            <div class="timeline-item">
                <div class="timeline-time">
                    08.16
                    <small>周日</small>
                </div>
                <div class="timeline-content">
                    <div class="timeline-info">
                        <div class="timeline-title">流浪地球2</div>
                        <div class="timeline-desc">郭帆 | 科幻 | 灾难 | 冒险</div>
                        <div class="timeline-stars">★★★★★</div>
                    </div>
                    <img src="https://picsum.photos/id/1/80/112" class="timeline-cover" alt="流浪地球2">
                </div>
            </div>

            <!-- 绿皮书 -->
            <div class="timeline-item">
                <div class="timeline-time">
                    08.16
                    <small>周日</small>
                </div>
                <div class="timeline-content">
                    <div class="timeline-info">
                        <div class="timeline-title">绿皮书</div>
                        <div class="timeline-desc">彼得·法雷里 | 剧情 | 喜剧 | 传记</div>
                        <div class="timeline-stars">★★★★★</div>
                    </div>
                    <img src="https://picsum.photos/id/25/80/112" class="timeline-cover" alt="绿皮书">
                </div>
            </div>

            <!-- 庆余年 -->
            <div class="timeline-item">
                <div class="timeline-time">
                    08.16
                    <small>周日</small>
                </div>
                <div class="timeline-content">
                    <div class="timeline-info">
                        <div class="timeline-title">庆余年</div>
                        <div class="timeline-desc">孙皓 | 古装 | 权谋 | 喜剧</div>
                        <div class="timeline-stars">★★★★☆</div>
                    </div>
                    <img src="https://picsum.photos/id/106/80/112" class="timeline-cover" alt="庆余年">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
