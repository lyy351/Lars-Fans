<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>黄子弘凡 · 温暖档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #2C1810;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部栏 */
        .top-bar {
            background: #2C1810;
            color: #FFD93D;
            border-bottom: 6px solid #FFD93D;
            padding: 10px 20px;
        }

        /* 笑脸行 */
        .smiley-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .smiley {
            font-size: 80px;
            line-height: 1;
            color: #FFD93D;
            filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.6));
            transition: transform 0.3s ease, color 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .smiley:hover {
            transform: scale(1.1) rotate(2deg);
            color: #FF8A5C;
        }

        .tagline {
            font-size: 18px;
            color: #FFE8D6;
            background: #FF8A5C;
            padding: 5px 15px;
            border-radius: 40px;
            border: 2px solid #FFD93D;
        }

        /* 导航栏 */
        .nav-bar {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 0 10px;
            scrollbar-width: thin;
            scrollbar-color: #FF6B6B #FFE8D6;
            -webkit-overflow-scrolling: touch;
        }

        .nav-bar::-webkit-scrollbar {
            height: 6px;
        }

        .nav-bar::-webkit-scrollbar-thumb {
            background: #FF6B6B;
            border-radius: 10px;
        }

        .nav-btn {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            font-size: 24px;
            font-weight: bold;
            background-color: #FFD93D;
            border: 3px solid #FF6B6B;
            border-radius: 40px;
            color: #2C1810;
            cursor: pointer;
            box-shadow: 3px 3px 0 #FF6B6B;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-btn.active {
            background-color: #FF6B6B;
            color: white;
            border-color: #FFD93D;
            box-shadow: 0 0 0 3px #FFD93D;
            transform: scale(1.02);
        }

        /* 激活时图标可替换为 GIF（需自行准备图片） */
        .nav-btn.active .btn-icon {
            /* 示例：用背景图方式，请将图片放入 images/ 并修改路径 */
            /* background-image: url('images/laugh.gif'); */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 32px;
            height: 32px;
            display: inline-block;
            color: transparent;
            text-indent: 100%;
            white-space: nowrap;
            overflow: hidden;
        }

        .btn-icon {
            font-size: 32px;
            line-height: 1;
        }

        /* 卡片容器 */
        .cards-container {
            display: flex;
            flex: 1;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            background: #FFF9E6;
        }

        .cards-container::-webkit-scrollbar {
            display: none;
        }

        .card {
            flex: 0 0 100%;
            scroll-snap-align: start;
            overflow-y: auto;
            padding: 20px;
            background: #FFF9E6;
        }

        .page-frame {
            width: 100%;
            border: none;
            display: block;
            height: 0;
            min-height: 300px;
        }

        /* 电脑端禁止手势滑动 */
        @media (min-width: 769px) {
            .cards-container {
                overflow-x: hidden;
            }
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .smiley {
                font-size: 60px;
            }
            .tagline {
                font-size: 14px;
                padding: 4px 12px;
            }
            .nav-btn {
                font-size: 20px;
                padding: 6px 18px;
            }
            .btn-icon {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="smiley-row">
            <div class="smiley" id="giantSmiley">😉</div>
            <div class="tagline">黄子弘凡 · 温暖档案馆</div>
        </div>
        <nav class="nav-bar" id="navBar">
            <button class="nav-btn active" data-index="0"><span class="btn-icon">📹</span> Vlog</button>
            <button class="nav-btn" data-index="1"><span class="btn-icon">📅</span> 时间线</button>
            <button class="nav-btn" data-index="2"><span class="btn-icon">🖼️</span> 图鉴</button>
            <button class="nav-btn" data-index="3"><span class="btn-icon">📺</span> 活动</button>
            <button class="nav-btn" data-index="4"><span class="btn-icon">ℹ️</span> 关于</button>
        </nav>
    </header>

    <main class="cards-container" id="cardsContainer">
        <div class="card" data-src="pages/vlog.html"><iframe class="page-frame" src="pages/vlog.html"></iframe></div>
        <div class="card" data-src="pages/timeline.html"><iframe class="page-frame" src="pages/timeline.html"></iframe></div>
        <div class="card" data-src="pages/gallery.html"><iframe class="page-frame" src="pages/gallery.html"></iframe></div>
        <div class="card" data-src="pages/activity.html"><iframe class="page-frame" src="pages/activity.html"></iframe></div>
        <div class="card" data-src="pages/about.html"><iframe class="page-frame" src="pages/about.html"></iframe></div>
    </main>

    <script>
        (function() {
            const container = document.getElementById('cardsContainer');
            const cards = document.querySelectorAll('.card');
            const navBtns = document.querySelectorAll('.nav-btn');
            const smiley = document.getElementById('giantSmiley');

            let activeIndex = 0;
            let isMobile = window.innerWidth <= 768;

            // iframe 高度自适应
            function resizeIframe(iframe) {
                try {
                    if (iframe.contentDocument && iframe.contentDocument.body) {
                        const height = iframe.contentDocument.body.scrollHeight;
                        iframe.style.height = height + 'px';
                    }
                } catch (e) {}
            }

            const iframes = document.querySelectorAll('.page-frame');
            iframes.forEach(iframe => {
                iframe.addEventListener('load', function() {
                    resizeIframe(this);
                    setTimeout(() => resizeIframe(this), 300);
                    setTimeout(() => resizeIframe(this), 800);
                });
            });

            window.addEventListener('resize', () => {
                iframes.forEach(iframe => resizeIframe(iframe));
                isMobile = window.innerWidth <= 768;
                scrollToCard(activeIndex, false);
            });

            function setActiveButton(index) {
                navBtns.forEach((btn, i) => {
                    if (i === index) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
                activeIndex = index;
            }

            function scrollToCard(index, smooth = true) {
                if (!container) return;
                const cardWidth = container.clientWidth;
                if (cardWidth === 0) return;
                container.scrollTo({
                    left: index * cardWidth,
                    behavior: smooth ? 'smooth' : 'auto'
                });
            }

            function getIndexFromScroll() {
                if (!container) return 0;
                const scrollLeft = container.scrollLeft;
                const cardWidth = container.clientWidth;
                if (cardWidth === 0) return 0;
                return Math.round(scrollLeft / cardWidth);
            }

            function handleScroll() {
                if (!isMobile) return;
                const newIndex = getIndexFromScroll();
                if (newIndex !== activeIndex && newIndex >= 0 && newIndex < navBtns.length) {
                    setActiveButton(newIndex);
                }
            }
            container.addEventListener('scroll', handleScroll);

            navBtns.forEach((btn, index) => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setActiveButton(index);
                    scrollToCard(index, true);
                });
            });

            // 笑脸彩蛋
            const messages = [
                "今天也要开心哦！", "去看最新Vlog了吗？", "猜猜我下周去哪？",
                "这个笑容你给几分？", "嘿嘿嘿", "演唱会等你来！",
                "吃了吗？", "又是元气满满的一天", "🎵 哼着歌呢"
            ];
            const emojis = ['😉', '😄', '😁', '😆', '😂', '😎'];
            const colors = ['#FFD93D', '#FF8A5C', '#FF6B6B', '#FFB347', '#FF9F1C'];

            smiley.addEventListener('click', () => {
                const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                smiley.textContent = randomEmoji;
                smiley.style.color = colors[Math.floor(Math.random() * colors.length)];
                const msg = messages[Math.floor(Math.random() * messages.length)];
                alert(msg); // 可替换为自定义提示
            });

            setActiveButton(0);
            scrollToCard(0, false);

            window.addEventListener('load', () => {
                iframes.forEach(iframe => resizeIframe(iframe));
            });
        })();
    </script>
</body>
</html>
