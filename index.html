<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>黄子弘凡 · 温暖档案馆</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- emfont 在线像素字体 -->
    <script src="https://unpkg.com/emfont@latest/emfont.js"></script>
    <link rel="icon" type="image/png" href="/Lars-Fans/images/smily.png">
</head>
<body>
    <header class="top-bar">
        <div class="smiley-row">
            <div class="smiley" id="giantSmiley">
                <img src="images/smiley.png" alt="黄子弘凡笑脸">
            </div>
            <div class="tagline 缝合像素字型 12px Mono">黄子弘凡 · 温暖档案馆</div>
        </div>
        <nav class="nav-bar" id="navBar">
            <button class="nav-btn active" data-index="0">Vlog</button>
            <button class="nav-btn" data-index="1">时间线</button>
            <button class="nav-btn" data-index="2">图鉴</button>
            <button class="nav-btn" data-index="3">活动</button>
            <button class="nav-btn" data-index="4">关于</button>
        </nav>
    </header>

    <main class="cards-container" id="cardsContainer">
        <div class="card" data-src="pages/vlog.html"><iframe class="page-frame" src="pages/vlog.html"></iframe></div>
        <div class="card" data-src="pages/timeline.html"><iframe class="page-frame" src="pages/timeline.html"></iframe></div>
        <div class="card" data-src="pages/gallery.html"><iframe class="page-frame" src="pages/gallery.html"></iframe></div>
        <div class="card" data-src="pages/activity.html"><iframe class="page-frame" src="pages/activity.html"></iframe></div>
        <div class="card" data-src="pages/about.html"><iframe class="page-frame" src="pages/about.html"></iframe></div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
