<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古信纸 · 留言板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e1d5c0;  /* 深一点的旧纸色，衬托信纸 */
            font-family: 'Segoe UI', '华文楷体', cursive, sans-serif;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .guestbook-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 28px;
            color: #3e2e1f;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #c7a87b, #a57c5a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 10px;
            border-bottom: 2px dashed #b58b6b;
            letter-spacing: 2px;
        }

        /* 瀑布流网格 */
        .masonry {
            column-count: 3;
            column-gap: 20px;
        }

        @media (max-width: 800px) {
            .masonry {
                column-count: 2;
            }
        }
        @media (max-width: 500px) {
            .masonry {
                column-count: 1;
            }
        }

        /* 复古信纸卡片 */
        .message-card {
            break-inside: avoid;
            margin-bottom: 20px;
            /* 基础纸张色 */
            background-color: #faf0e6;
            /* 清晰的直线横线：1px 实线，间距24px */
            background-image: 
                repeating-linear-gradient(
                    to bottom,
                    #d9c8b2 0px,
                    #d9c8b2 1px,
                    transparent 1px,
                    transparent 24px
                );
            background-size: 100% 24px;
            background-position: 0 20px;   /* 从距离顶部20px处开始画线，留出天头 */
            background-repeat: no-repeat;    /* 防止重复，由 repeating-linear-gradient 控制 */
            /* 边缘轻微泛黄和阴影，增加复古感 */
            box-shadow: 0 4px 12px rgba(90, 60, 30, 0.15),
                        0 1px 2px rgba(0,0,0,0.05),
                        inset 0 0 0 1px rgba(255, 245, 220, 0.8);
            border-radius: 4px 12px 12px 4px;  /* 左侧稍微平直，模仿便签本 */
            padding: 20px 20px 25px 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            border-left: 4px solid #b58b6b;   /* 左侧加一条深色装饰边，像老式信纸 */
        }

        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(140, 90, 40, 0.3);
        }

        /* 留言内容区域（固定高度，内部滚动） */
        .message-content {
            max-height: 180px;
            overflow-y: auto;
            padding-right: 10px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 24px;      /* 与横线间距一致，让文字正好写在横线上 */
            color: #3e2e1f;
            position: relative;
            z-index: 2;
            /* 让滚动条窄一点，更精致 */
            scrollbar-width: thin;
            scrollbar-color: #b58b6b #f0e0d0;
        }

        .message-content::-webkit-scrollbar {
            width: 6px;
        }
        .message-content::-webkit-scrollbar-thumb {
            background: #b58b6b;
            border-radius: 10px;
        }
        .message-content::-webkit-scrollbar-track {
            background: #f0e0d0;
            border-radius: 10px;
        }

        .message-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #b58b6b;
            font-size: 12px;
            color: #5e4a38;
        }

        .author {
            font-weight: bold;
            color: #a55d3d;
        }

        .date {
            font-style: italic;
            color: #7b6350;
        }

        /* 双击放大模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(60, 40, 20, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .modal-card {
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            background-color: #faf0e6;
            background-image: 
                repeating-linear-gradient(
                    to bottom,
                    #d9c8b2 0px,
                    #d9c8b2 1px,
                    transparent 1px,
                    transparent 24px
                );
            background-size: 100% 24px;
            background-position: 0 20px;
            background-repeat: no-repeat;
            border-radius: 8px 24px 24px 8px;
            padding: 30px 30px 30px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow-y: auto;
            border: 2px solid #b58b6b;
            border-left-width: 8px;
        }

        .modal-card .message-content {
            max-height: none;
            overflow-y: visible;
            font-size: 16px;
            line-height: 24px;
            padding-right: 0;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #3e2e1f;
            background: rgba(255, 240, 220, 0.8);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
            border: 1px solid #b58b6b;
        }

        .modal-close:hover {
            background: #b58b6b;
            color: white;
        }

        .placeholder-note {
            text-align: center;
            color: #8b7a6a;
            font-style: italic;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="guestbook-container">
        <h1>📬 留言板 · 复古信纸</h1>

        <div class="masonry" id="masonryGrid"></div>
        <div class="placeholder-note" id="placeholder">
            ⭐ 双击任意留言卡片可放大查看 ⭐
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
            <span class="modal-close" id="modalClose">&times;</span>
            <div class="message-content" id="modalContent"></div>
            <div class="message-meta">
                <span class="author" id="modalAuthor"></span>
                <span class="date" id="modalDate"></span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const messages = [
                { author: '一个爱黄子的粉丝', date: '2026.03.15', content: '今天听了《元与均棋》现场，太震撼了！他的声音真的能穿透灵魂。希望以后能有更多个人演唱会！\n\n现场的氛围特别好，每一首歌都唱进了心里。尤其是最后那首安可曲，全场大合唱的时候真的忍不住流泪了。黄子在台上说“谢谢你们来听我唱歌”，那一刻觉得所有的喜欢都值得。\n\n回来后一直在回味，声音还在脑子里转。已经迫不及待想看下一场了！一定要抢到前排的票！\n\n另外，他穿的那件亮片外套太帅了，希望能出官方图～' },
                { author: '小黄鸭', date: '2026.03.14', content: '每周的Vlog是我一周的快乐源泉，黄子太可爱了！后台花絮永远看不够～' },
                { author: '兰州拉面', date: '2026.03.13', content: '从声入人入坑，这么多年看着他一步步成长，真的像看着一个老朋友在发光。加油！' },
                { author: '音乐剧迷', date: '2026.03.12', content: '强烈推荐黄子的音乐剧现场！他的表演和唱功都超棒，希望以后能看到更多音乐剧作品。' },
                { author: '路人转粉', date: '2026.03.11', content: '偶然刷到他的综艺片段，被圈粉了。然后来这个档案馆逛了一圈，太全了！谢谢站长～' },
                { author: '伯克利校友', date: '2026.03.10', content: '在伯克利的时候就听说他了，没想到真的火起来了。学弟加油！' },
                { author: '小太阳', date: '2026.03.09', content: '黄子就像小太阳一样温暖！每次心情不好就来看他的视频，立马被治愈。' },
                { author: '演唱会常客', date: '2026.03.08', content: '北京站、上海站都去了，下一站什么时候来广州呀？期待ing' },
                { author: '颜控晚期', date: '2026.03.07', content: '他的杂志图我每一张都收藏了！这个档案馆的图鉴功能太棒了，希望继续更新～' },
                { author: '默默支持', date: '2026.03.06', content: '不常发言，但一直在默默关注。黄子值得被更多人看见。' },
                { author: '新粉报到', date: '2026.03.05', content: '刚入坑，正在补课中！求推荐必看的综艺或舞台～' }
            ];

            const grid = document.getElementById('masonryGrid');
            const overlay = document.getElementById('modalOverlay');
            const modalContent = document.getElementById('modalContent');
            const modalAuthor = document.getElementById('modalAuthor');
            const modalDate = document.getElementById('modalDate');
            const modalClose = document.getElementById('modalClose');
            const placeholder = document.getElementById('placeholder');

            function renderMessages() {
                let html = '';
                messages.forEach((msg, index) => {
                    const contentHtml = msg.content.replace(/\n/g, '<br>');
                    html += `
                        <div class="message-card" data-index="${index}">
                            <div class="message-content">
                                ${contentHtml}
                            </div>
                            <div class="message-meta">
                                <span class="author">✍️ ${msg.author}</span>
                                <span class="date">📅 ${msg.date}</span>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html;
                placeholder.style.display = 'none';
            }

            renderMessages();

            grid.addEventListener('dblclick', (e) => {
                const card = e.target.closest('.message-card');
                if (!card) return;
                const index = card.dataset.index;
                const msg = messages[index];
                modalContent.innerHTML = msg.content.replace(/\n/g, '<br>');
                modalAuthor.textContent = '✍️ ' + msg.author;
                modalDate.textContent = '📅 ' + msg.date;
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            });

            const closeModal = () => {
                overlay.style.display = 'none';
                document.body.style.overflow = '';
            };

            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closeModal();
            });
            modalClose.addEventListener('click', closeModal);
        })();
    </script>
</body>
</html>
