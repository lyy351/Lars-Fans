<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄子弘凡 · 活动记录</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            padding: 10px;
        }
        h1 {
            color: #FF6B6B;
            border-bottom: 3px solid #FFD93D;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .activity-item {
            background: rgba(255, 241, 224, 0.8);
            backdrop-filter: blur(4px);
            padding: 18px;
            border-radius: 28px;
            border-left: 6px solid #FF8A5C;
            box-shadow: 0 4px 12px rgba(255,107,107,0.15);
        }
        .date {
            color: #FF8A5C;
            font-weight: bold;
            font-size: 16px;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #2C1810;
            margin: 5px 0;
        }
        .type {
            display: inline-block;
            background: #FFD93D;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 14px;
            color: #2C1810;
        }
        @media (max-width:768px) {
            h1 { font-size:24px; }
        }
    </style>
</head>
<body>
    <h1>📺 活动记录</h1>
    <div class="activity-list">
        <div class="activity-item"><span class="date">2026.03.10</span> <span class="type">发布会</span><div class="title">某品牌发布会（北京）</div></div>
        <div class="activity-item"><span class="date">2026.03.05</span> <span class="type">直播</span><div class="title">微博直播访谈</div></div>
        <div class="activity-item"><span class="date">2026.02.28</span> <span class="type">线下活动</span><div class="title">粉丝见面会（上海）</div></div>
    </div>
</body>
</html>
