<!DOCTYPE html>
<html>
<head>

    <style>
        body { font-family: sans-serif; padding: 20px; background: #FFF9E6; margin:0; }
        h1 { color: #FF6B6B; border-bottom: 3px solid #FFD93D; padding-bottom:10px; }
        .activity { margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .date { color: #FF8A5C; font-weight: bold; display: block; }
        .type { background: #FFD93D; padding: 3px 10px; border-radius: 20px; font-size: 14px; display: inline-block; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>📺 活动记录</h1>
    <div class="activity">
        <span class="date">2026.03.10</span>
        <span class="type">发布会</span>
        <p>某品牌发布会（北京）</p>
    </div>
    <div class="activity">
        <span class="date">2026.03.05</span>
        <span class="type">直播</span>
        <p>微博直播访谈</p>
    </div>
    <div class="activity">
        <span class="date">2026.02.28</span>
        <span class="type">线下活动</span>
        <p>粉丝见面会（上海）</p>
    </div>
</body>
</html>
