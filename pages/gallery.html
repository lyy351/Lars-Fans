        /*要增加排列图片旁边会显示图片（歌曲）的名字，双击图片会跳转到网易云或b站相关的页面。
另外酌情增加图片的粗糙毛玻璃质感。以及用gaso和hover做图片排开前的动效 */


<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>玻璃画廊 | 内描边 | 半透图片 | 倾斜堆叠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stack {
            position: relative;
            width: 800px;
            height: 600px;
            will-change: transform;
            transform: skewY(15deg);
        }

        /* 玻璃卡片样式 + 内描边（右边+上边） */
        .card {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 300px;
            height: 200px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
            background: rgba(255, 255, 255, 0.1);
            /* 外阴影保留，内描边通过 inset 阴影实现（右边和上边） */
            box-shadow: inset -4px 0 0 rgba(0, 0, 0, 0.6), inset 0 4px 0 rgba(0, 0, 0, 0.6), 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        .card img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.65;
            filter: saturate(1.3) contrast(1.05);
        }

        .card-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: #222;
            font-size: 16px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.9);
            background: rgba(255,255,240,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            width: auto;
            max-width: calc(100% - 40px);
            pointer-events: none;
            z-index: 2;
        }

        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(transparent 50%, rgba(0, 0, 0, 0.02) 100%);
            z-index: 2;
        }

        .logo {
            position: fixed;
            top: 24px;
            left: 28px;
            z-index: 10;
            opacity: 0.8;
            font-weight: 500;
            font-size: 20px;
            color: #4a4a4a;
            background: rgba(255,255,240,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 40px;
        }

        .hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            color: #fff;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }

        @media (max-width: 680px) {
            .card {
                width: 260px;
                height: 173px;
            }
            .stack {
                transform: scale(0.85) skewY(15deg);
                transform-origin: center;
            }
            .card-text {
                font-size: 13px;
                bottom: 12px;
                left: 12px;
            }
            /* 小屏幕下内描边厚度适当减薄 */
            .card {
                box-shadow: inset -3px 0 0 rgba(0, 0, 0, 0.6), inset 0 3px 0 rgba(0, 0, 0, 0.6), 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            }
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="logo">◈ 内描边玻璃画廊 ◈</div>
    <div class="hint">🖱️ 滚轮 — 沿阶梯方向移动 | ✨ 悬停 — 向右抽出 | 右边+上边黑色内描边</div>

    <div class="scene">
        <div class="stack" id="cardStack"></div>
    </div>

    <script>
        const cardsData = [
            { title: "雾中的孤独", query: "misty fjord morning fog dramatic moody landscape photography minimalist gray tones serene water reflection soft diffused light wide panoramic view fine art" },
            { title: "玻璃大教堂", query: "modern glass architecture building facade reflections abstract minimalist geometric patterns wide angle contemporary architecture photography clean sky fine art" },
            { title: "城市阴影", query: "tokyo night street rain reflections neon lights moody atmospheric wide urban photography cinematic dark dramatic japanese city panoramic" },
            { title: "最后的光芒", query: "portrait photography golden hour side light dramatic shadows moroccan desert warm tones wide shot atmospheric fine art cinematic landscape human figure" },
            { title: "矿物蓝", query: "iceland glacier lake blue ice abstract texture cold minimalist ethereal aerial water patterns wide panoramic monochromatic fine art nature photography" },
            { title: "具体的梦想", query: "brutalist concrete architecture dramatic shadows geometric forms wide minimalist modern building interior fine art photography stark light raw texture horizontal" },
            { title: "漂浮森林", query: "misty pine forest mountain ethereal fog dreamy soft light wide landscape fine art chinese nature photography layers depth serene minimal panoramic" },
            { title: "沙漠几何", query: "sahara desert sand dunes abstract curves shadows golden light minimalist wide geometric fine art landscape photography warm tones graphic panoramic" },
            { title: "雨后", query: "shanghai rainy street night reflections puddle mirror effect wide moody atmospheric urban photography lights blurred cinematic color street scene horizontal" },
            { title: "安静室", query: "japanese zen garden kyoto minimalist interior wide room soft window light serene traditional architecture fine art photography calm neutral tones horizontal" },
            { title: "态域", query: "abstract industrial macro photography geometric circles metallic textures dark moody conceptual fine art long exposure concentric patterns dramatic wide" },
            { title: "脉冲", query: "new york subway wide shot dramatic light cinematic moody street photography contemplative urban life fine art black and white horizontal scene" },
            { title: "盐滩", query: "uyuni salt flats bolivia mirror reflection sky minimalist dramatic wide landscape person silhouette infinite horizon fine art photography ethereal surreal" },
            { title: "骨白", query: "santorini white architecture blue dome minimalist mediterranean light wide angle geometric forms fine art travel photography greek island bright airy panoramic" }
        ];

        // 生成稳定图片链接 (picsum)
        const imageUrls = [];
        for (let i = 1; i <= cardsData.length; i++) {
            imageUrls.push(`https://picsum.photos/id/${(100 + i) % 300 + 1}/560/380`);
        }

        const OFFSET_X = 48;
        const OFFSET_Y = -40;
        const DIR_X = OFFSET_X;
        const DIR_Y = OFFSET_Y;

        const container = document.getElementById('cardStack');

        cardsData.forEach((card, index) => {
            const div = document.createElement('div');
            div.className = 'card';
            const translateX = index * OFFSET_X;
            const translateY = index * OFFSET_Y;
            const baseTransform = `translateX(${translateX}px) translateY(${translateY}px)`;
            div.style.transform = baseTransform;
            div.style.zIndex = cardsData.length - index;

            const img = document.createElement('img');
            img.src = imageUrls[index];
            img.alt = card.title;
            img.loading = "lazy";
            div.appendChild(img);

            const textSpan = document.createElement('div');
            textSpan.className = 'card-text';
            textSpan.innerText = card.title;
            div.appendChild(textSpan);

            container.appendChild(div);

            div.addEventListener('mouseenter', () => {
                div.style.transform = `${baseTransform} translateX(200px)`;
            });
            div.addEventListener('mouseleave', () => {
                div.style.transform = baseTransform;
            });
        });

        const stackDiv = document.querySelector('.stack');
        let targetDistance = 0;
        let currentDistance = 0;
        const STEP = 20;
        const EASING = 0.35;

        const len = Math.hypot(DIR_X, DIR_Y);
        const normX = DIR_X / len;
        const normY = DIR_Y / len;

        function animate() {
            currentDistance += (targetDistance - currentDistance) * EASING;
            const dx = currentDistance * normX;
            const dy = currentDistance * normY;
            stackDiv.style.transform = `skewY(15deg) translate3d(${dx}px, ${dy}px, 0)`;
            requestAnimationFrame(animate);
        }

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 1 : -1;
            targetDistance += delta * STEP;
            targetDistance = Math.min(800, Math.max(-800, targetDistance));
        }, { passive: false });

        animate();
    </script>
</body>
</html>
