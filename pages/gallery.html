<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄子弘凡 · 图鉴</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            padding: 10px;
        }
        h1 {
            color: #FF6B6B;
            border-bottom: 3px solid #FFD93D;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .photo {
            background: #f0f0f0;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 18px rgba(255,107,107,0.2);
        }
        .caption {
            text-align: center;
            margin-top: 5px;
            color: #2C1810;
            font-size: 14px;
        }
        @media (max-width:768px) {
            h1 { font-size:24px; }
        }
    </style>
</head>
<body>
    <h1 class="缝合像素字型 12px Mono">🖼️ 图鉴</h1>
    <div class="gallery">
        <div class="photo" style="background-image: url('https://via.placeholder.com/200?text=杂志照');"></div>
        <div class="photo" style="background-image: url('https://via.placeholder.com/200?text=舞台照');"></div>
        <div class="photo" style="background-image: url('https://via.placeholder.com/200?text=活动照');"></div>
        <!-- 替换为真实图片 -->
    </div>
</body>
</html>
