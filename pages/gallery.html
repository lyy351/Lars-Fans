<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄子弘凡 · 图鉴 · 磨砂版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --c-00: #ffffff;
            --c-22: #dbdbdb;
            --c-66: #b3b3b3;
            --c-99: #707070;
            --c-ff: #222222;
            --p-main: #FF8A5C;
            --p-hover: #FF6B6B;
            --p-weak: #FFD93D20;
            --s-1: #2d2e2f;
            --s-1-hover: #323434;
            --radius-12: 12px;
            --radius-16: 16px;
            --space-16: 16px;
            --shadow-lg: 0 18px 48px rgba(0, 0, 0, 0.12);
        }

        body {
            background: linear-gradient(145deg, #0a0f14, #1a1f24);
            min-height: 100vh;
            padding: 30px 20px;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--c-22);
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--p-weak);
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 28px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFD93D, #FF8A5C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .layout-buttons {
            display: flex;
            gap: 12px;
        }

        .layout-btn {
            background: var(--s-1);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            color: var(--c-22);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .layout-btn:hover {
            background: var(--s-1-hover);
        }

        .layout-btn.active {
            background: var(--p-main);
            color: var(--c-ff);
        }

        .card-container {
            position: relative;
            width: 100%;
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        .card {
            width: 220px;
            height: 280px;
            position: relative;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            transform-style: preserve-3d;
            cursor: pointer;
            flex-shrink: 0;
            margin: 10px;
            background: var(--s-1);
            border-radius: var(--radius-16);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: rotateY(180deg);
            box-shadow: 0 25px 50px -12px rgba(255, 107, 107, 0.5);
        }

        .card .front, .card .back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: var(--radius-16);
            backface-visibility: hidden;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
        }

        .card .front {
            background: linear-gradient(145deg, #2a3238, #1a2126);
        }

        .card .front img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius-12);
            margin-bottom: 15px;
        }

        .card .front .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: #FFD93D;
        }

        .card .back {
            transform: rotateY(180deg);
            background: var(--p-main);
            color: var(--c-ff);
        }

        .card .back p {
            font-size: 14px;
            line-height: 1.6;
        }

        /* 行布局 */
        .layout-row {
            overflow-x: auto;
            display: flex;
            gap: 25px;
            padding: 20px 10px;
            scroll-snap-type: x mandatory;
        }
        .layout-row .card {
            scroll-snap-align: start;
        }

        /* 圆环布局 */
        .layout-circle {
            position: relative;
            width: 500px;
            height: 500px;
            margin: 0 auto;
        }
        .layout-circle .card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 220px;
            margin-left: -90px;
            margin-top: -110px;
        }

        /* 3D队列布局 */
        .layout-3d {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transform-style: preserve-3d;
            transform: rotateX(5deg) rotateY(0deg);
        }
        .layout-3d .card:nth-child(1) { transform: scale(1.2) translateZ(50px); }
        .layout-3d .card:nth-child(2) { transform: scale(1.0) translateZ(0); }
        .layout-3d .card:nth-child(3) { transform: scale(0.9) translateZ(-30px); }
        .layout-3d .card:nth-child(4) { transform: scale(0.8) translateZ(-60px); }
        .layout-3d .card:nth-child(5) { transform: scale(0.7) translateZ(-90px); }

        @media (max-width: 768px) {
            h1 { font-size: 20px; }
            .layout-btn { font-size: 12px; padding: 8px 16px; }
            .layout-circle { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <div class="header">
            <h1 class="缝合像素字型 12px Mono">🖼️ 图鉴 · 磨砂版</h1>
            <div class="layout-buttons">
                <button class="layout-btn active" data-layout="row">一行排列</button>
                <button class="layout-btn" data-layout="circle">圆环排列</button>
                <button class="layout-btn" data-layout="3d">3D队列</button>
            </div>
        </div>

        <div class="card-container" id="cardContainer">
            <!-- 卡片由JS生成 -->
        </div>
    </div>

    <script>
        (function() {
            const cardsData = [
                { img: 'https://via.placeholder.com/220x160/FFD93D/000?text=舞台', title: '2025演唱会', desc: '北京站 · 元与均棋' },
                { img: 'https://via.placeholder.com/220x160/FF8A5C/000?text=杂志', title: '费加罗', desc: '12月刊 · 复古大片' },
                { img: 'https://via.placeholder.com/220x160/FF6B6B/000?text=生日', title: '2026生日会', desc: '粉丝合影 · 直播截图' },
                { img: 'https://via.placeholder.com/220x160/FFD93D/000?text=活动', title: '品牌发布会', desc: '上海 · 品牌挚友' },
                { img: 'https://via.placeholder.com/220x160/FF8A5C/000?text=日常', title: '后台花絮', desc: '彩排瞬间 · 笑容灿烂' }
            ];

            const container = document.getElementById('cardContainer');
            const buttons = document.querySelectorAll('.layout-btn');
            let currentLayout = 'row';

            function renderCards() {
                let html = '';
                cardsData.forEach((item, index) => {
                    html += `
                        <div class="card" data-index="${index}">
                            <div class="front">
                                <img src="${item.img}" alt="${item.title}">
                                <div class="title">${item.title}</div>
                            </div>
                            <div class="back">
                                <p>${item.desc}</p>
                            </div>
                        </div>
                    `;
                });
                return html;
            }

            container.innerHTML = renderCards();
            container.classList.add(`layout-${currentLayout}`);

            function applyCircleLayout() {
                const cards = document.querySelectorAll('.card');
                const total = cards.length;
                const angleStep = (2 * Math.PI) / total;
                const radius = 200;
                cards.forEach((card, i) => {
                    const angle = i * angleStep;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${angle}rad)`;
                    card.style.position = 'absolute';
                });
            }

            function clearCardStyles() {
                const cards = document.querySelectorAll('.card');
                cards.forEach(card => {
                    card.style.transform = '';
                    card.style.position = '';
                });
            }

            function switchLayout(layout) {
                container.classList.remove('layout-row', 'layout-circle', 'layout-3d');
                clearCardStyles();
                container.classList.add(`layout-${layout}`);
                if (layout === 'circle') applyCircleLayout();
                buttons.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.layout === layout) btn.classList.add('active');
                });
                currentLayout = layout;
            }

            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    switchLayout(e.target.dataset.layout);
                });
            });
        })();
    </script>
</body>
</html>
