<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄子弘凡 · 时间线</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            padding: 10px;
        }
        h1 {
            color: #FF6B6B;
            border-bottom: 3px solid #FFD93D;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .sort-controls {
            display: flex;
            gap: 10px;
        }
        .sort-btn {
            background: #FFD93D;
            border: 2px solid #FF6B6B;
            color: #2C1810;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 2px 2px 0 #FF6B6B;
        }
        .sort-btn.active {
            background: #FF6B6B;
            color: white;
            border-color: #FFD93D;
        }
        .timeline {
            position: relative;
            margin-top: 30px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #FFD93D, #FF8A5C, #FF6B6B);
            transform: translateX(-50%);
            border-radius: 2px;
            z-index: 1;
        }
        .timeline-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }
        .timeline-left, .timeline-right {
            width: 45%;
        }
        .timeline-left {
            padding-right: 30px;
            text-align: right;
        }
        .timeline-right {
            padding-left: 30px;
        }
        .timeline-point {
            width: 10%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .point-dot {
            width: 20px;
            height: 20px;
            background: #FF6B6B;
            border: 4px solid #FFD93D;
            border-radius: 50%;
            box-shadow: 0 0 0 2px #FF8A5C;
        }
        .point-date {
            font-size: 16px;
            font-weight: bold;
            color: #2C1810;
            background: #FFE8D6;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 8px;
            white-space: nowrap;
            border: 1px solid #FF8A5C;
        }
        .content-card {
            background: rgba(255, 241, 224, 0.8);
            backdrop-filter: blur(4px);
            padding: 15px 20px;
            border-radius: 20px;
            border-left: 6px solid #FF8A5C;
            box-shadow: 0 4px 10px rgba(255,107,107,0.1);
        }
        .left-card {
            border-left-color: #FFD93D;
        }
        .content-title {
            font-weight: bold;
            color: #2C1810;
            font-size: 18px;
        }
        @media (max-width: 768px) {
            h1 { font-size: 24px; flex-direction: column; align-items: start; gap:10px; }
            .timeline-item { flex-wrap: wrap; }
            .timeline-left, .timeline-right, .timeline-point {
                width: 100%;
                padding: 0;
                text-align: left;
            }
            .timeline-point {
                flex-direction: row;
                gap: 10px;
                margin: 10px 0;
            }
            .point-date { margin-top:0; }
            .timeline::before { left: 20px; }
            .timeline-left, .timeline-right { padding-left: 40px; }
        }
    </style>
</head>
<body>
    <h1>
        📅 黄子弘凡 · 时间线
        <div class="sort-controls">
            <button class="sort-btn active" id="sortAsc">顺序 ↑</button>
            <button class="sort-btn" id="sortDesc">倒序 ↓</button>
        </div>
    </h1>
    <div id="timelineWrapper" class="timeline"></div>
    <script>
        (function(){
            const data = [
                { date:'1999年', left:'出生于甘肃兰州', right:'—' },
                { date:'2018年', left:'参加《声入人心》', right:'《声入人心》演唱' },
                { date:'2023年', left:'伯克利毕业', right:'毕业音乐会' },
                { date:'2024年', left:'首次个人巡演', right:'“元与均棋”音乐会' },
                { date:'2025年', left:'参与6档综艺', right:'《时光音乐会》等' },
                { date:'2026年', left:'新专辑筹备', right:'待定' }
            ];
            const wrapper = document.getElementById('timelineWrapper');
            const ascBtn = document.getElementById('sortAsc');
            const descBtn = document.getElementById('sortDesc');
            let order = 'asc';
            function render(order) {
                let sorted = [...data].sort((a,b)=> order==='asc'? a.date.localeCompare(b.date): b.date.localeCompare(a.date));
                let html = '';
                sorted.forEach(item=>{
                    html += `
                        <div class="timeline-item">
                            <div class="timeline-left"><div class="content-card left-card"><div class="content-title">🌟 ${item.left}</div></div></div>
                            <div class="timeline-point"><div class="point-dot"></div><span class="point-date">${item.date}</span></div>
                            <div class="timeline-right"><div class="content-card"><div class="content-title">🎤 ${item.right}</div></div></div>
                        </div>
                    `;
                });
                wrapper.innerHTML = html;
                ascBtn.classList.toggle('active', order==='asc');
                descBtn.classList.toggle('active', order==='desc');
            }
            ascBtn.addEventListener('click', ()=>{ order='asc'; render('asc'); });
            descBtn.addEventListener('click', ()=>{ order='desc'; render('desc'); });
            render('asc');
        })();
    </script>
</body>
</html>
