<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄子弘凡 · 时间线</title>
    <style>
        /* 保持与主站一致的暖色调 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #FFF9E6;  /* 与卡片背景相同 */
            padding: 20px;
            min-height: 100vh;
        }
        .timeline-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        h1 {
            color: #FF6B6B;
            border-bottom: 3px solid #FFD93D;
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .sort-controls {
            display: flex;
            gap: 10px;
        }
        .sort-btn {
            background: #FFD93D;
            border: 2px solid #FF6B6B;
            color: #2C1810;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 2px 2px 0 #FF6B6B;
            font-size: 16px;
        }
        .sort-btn.active {
            background: #FF6B6B;
            color: white;
            border-color: #FFD93D;
            box-shadow: 0 0 0 2px #FFD93D;
        }
        .sort-btn:hover {
            transform: scale(1.02);
        }

        /* 时间轴区域 */
        .timeline {
            position: relative;
            margin-top: 30px;
        }
        /* 中间线 */
        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #FFD93D, #FF8A5C, #FF6B6B);
            transform: translateX(-50%);
            border-radius: 2px;
            z-index: 1;
        }
        .timeline-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }
        /* 左侧内容 */
        .timeline-left {
            width: 45%;
            padding-right: 30px;
            text-align: right;
        }
        /* 右侧内容 */
        .timeline-right {
            width: 45%;
            padding-left: 30px;
        }
        /* 中间的时间点 */
        .timeline-point {
            width: 10%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .point-dot {
            width: 20px;
            height: 20px;
            background: #FF6B6B;
            border: 4px solid #FFD93D;
            border-radius: 50%;
            box-shadow: 0 0 0 2px #FF8A5C;
            z-index: 3;
            transition: 0.2s;
        }
        .point-date {
            font-size: 16px;
            font-weight: bold;
            color: #2C1810;
            background: #FFE8D6;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 8px;
            white-space: nowrap;
            border: 1px solid #FF8A5C;
        }
        /* 内容卡片 */
        .content-card {
            background: #FFF1E0;
            padding: 15px 20px;
            border-radius: 20px;
            border-left: 6px solid #FF8A5C;
            box-shadow: 0 4px 10px rgba(255,107,107,0.1);
        }
        .left-card {
            border-left-color: #FFD93D;
        }
        .content-title {
            font-weight: bold;
            color: #2C1810;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .content-desc {
            color: #555;
            font-size: 15px;
            line-height: 1.5;
        }
        /* 空状态 */
        .empty-note {
            color: #aaa;
            text-align: center;
            padding: 40px;
            font-style: italic;
        }
        /* 手机适配 */
        @media (max-width: 700px) {
            .timeline-item {
                flex-wrap: wrap;
            }
            .timeline-left, .timeline-right, .timeline-point {
                width: 100%;
                padding: 0;
                text-align: left;
            }
            .timeline-point {
                flex-direction: row;
                gap: 10px;
                margin: 10px 0;
            }
            .point-date {
                margin-top: 0;
            }
            .timeline::before {
                left: 20px;
            }
            .timeline-left {
                padding-left: 40px;
            }
            .timeline-right {
                padding-left: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="timeline-container">
        <h1>
            📅 黄子弘凡 · 时间线
            <div class="sort-controls">
                <button class="sort-btn active" id="sortAsc">顺序 ↑</button>
                <button class="sort-btn" id="sortDesc">倒序 ↓</button>
            </div>
        </h1>

        <!-- 时间轴将动态渲染到这里 -->
        <div id="timelineWrapper"></div>
    </div>

    <script>
        (function() {
            // 原始数据：左边=日常/活动，右边=综艺/演唱会
            const rawData = [
                { date: '1999年', left: '出生于甘肃兰州', right: '' },
                { date: '2018年', left: '参加《声入人心》第一季', right: '《声入人心》演唱' },
                { date: '2019年', left: '随声入人心巡演', right: '音乐会巡演' },
                { date: '2020年', left: '发行首支单曲', right: '《你的名字》' },
                { date: '2021年', left: '参加综艺《流淌的歌声》', right: '' },
                { date: '2022年', left: '伯克利音乐学院深造', right: '' },
                { date: '2023年', left: '伯克利毕业音乐会', right: '毕业音乐会' },
                { date: '2024年', left: '首次个人巡回音乐会', right: '“元与均棋”音乐会' },
                { date: '2025年', left: '参与6档综艺录制', right: '《时光音乐会》《声生不息》等' },
                { date: '2026年', left: '新专辑筹备中', right: '待定' }
            ];

            // 过滤掉空内容的数据（如果右边为空，则显示占位）
            const timelineData = rawData.map(item => ({
                date: item.date,
                left: item.left || '—',
                right: item.right || '—'
            }));

            const wrapper = document.getElementById('timelineWrapper');
            const sortAscBtn = document.getElementById('sortAsc');
            const sortDescBtn = document.getElementById('sortDesc');

            let currentOrder = 'asc'; // asc 或 desc

            // 渲染函数
            function render(order) {
                // 复制数据并排序
                let sorted = [...timelineData];
                if (order === 'asc') {
                    sorted.sort((a, b) => a.date.localeCompare(b.date, 'zh-CN', { numeric: true }));
                } else {
                    sorted.sort((a, b) => b.date.localeCompare(a.date, 'zh-CN', { numeric: true }));
                }

                // 生成HTML
                let html = '<div class="timeline">';
                sorted.forEach(item => {
                    html += `
                        <div class="timeline-item">
                            <div class="timeline-left">
                                <div class="content-card left-card">
                                    <div class="content-title">🌟 ${item.left}</div>
                                    ${item.left.includes('—') ? '' : '<div class="content-desc">日常·活动</div>'}
                                </div>
                            </div>
                            <div class="timeline-point">
                                <div class="point-dot"></div>
                                <span class="point-date">${item.date}</span>
                            </div>
                            <div class="timeline-right">
                                <div class="content-card">
                                    <div class="content-title">🎤 ${item.right}</div>
                                    ${item.right.includes('—') ? '' : '<div class="content-desc">综艺·演唱会</div>'}
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';

                wrapper.innerHTML = html;

                // 更新按钮激活状态
                if (order === 'asc') {
                    sortAscBtn.classList.add('active');
                    sortDescBtn.classList.remove('active');
                } else {
                    sortDescBtn.classList.add('active');
                    sortAscBtn.classList.remove('active');
                }
            }

            // 事件绑定
            sortAscBtn.addEventListener('click', () => {
                if (currentOrder === 'asc') return;
                currentOrder = 'asc';
                render('asc');
            });
            sortDescBtn.addEventListener('click', () => {
                if (currentOrder === 'desc') return;
                currentOrder = 'desc';
                render('desc');
            });

            // 初始渲染（顺序）
            render('asc');
        })();
    </script>
</body>
</html>
