<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄子弘凡 · Vlog合集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: transparent;  /* 让父卡片背景透出 */
            padding: 10px;
        }
        h1 {
            color: #FF6B6B;
            border-bottom: 3px solid #FFD93D;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 28px;
        }
        /* 固定两列布局，无论手机电脑都是两列 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .video-card {
            background: rgba(255, 241, 224, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(255,107,107,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.2s ease;
        }
        .video-card:hover {
            transform: translateY(-4px);
        }
        /* 视频容器固定宽高比 16:9 */
        .video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #2C1810;  /* 深色占位 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD93D;
            font-size: 14px;
            overflow: hidden;
        }
        .video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;  /* 保证视频填满不变形 */
        }
        .video-info {
            padding: 15px;
        }
        .video-title {
            font-weight: bold;
            color: #2C1810;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .video-date {
            color: #FF8A5C;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .video-desc {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
        }
        /* 小屏幕时适当缩小内边距，但保持两列 */
        @media (max-width: 600px) {
            body {
                padding: 5px;
            }
            h1 {
                font-size: 24px;
            }
            .video-info {
                padding: 10px;
            }
            .video-title {
                font-size: 16px;
            }
            .video-date {
                font-size: 12px;
            }
            .video-desc {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <h1>📹 黄子弘凡 · 每周Vlog</h1>
    <div class="video-grid">
        <!-- 示例卡片1 - 替换为实际微博iframe -->
        <div class="video-card">
            <div class="video-player">
                <!-- 在这里粘贴微博视频的iframe代码，例如： -->
                <!-- <iframe src="https://video.weibo.com/player/..."></iframe> -->
                <span style="color:#aaa;">微博视频占位 1</span>
            </div>
            <div class="video-info">
                <div class="video-title">📽️ 这周的后台日常</div>
                <div class="video-date">📅 2026.03.15</div>
                <div class="video-desc">彩排小花絮，还有神秘嘉宾出现～</div>
            </div>
        </div>
        <!-- 示例卡片2 -->
        <div class="video-card">
            <div class="video-player">
                <span style="color:#aaa;">微博视频占位 2</span>
            </div>
            <div class="video-info">
                <div class="video-title">🎵 新歌试唱片段</div>
                <div class="video-date">📅 2026.03.08</div>
                <div class="video-desc">第一次在Vlog里唱新歌，听听看！</div>
            </div>
        </div>
        <!-- 示例卡片3 -->
        <div class="video-card">
            <div class="video-player">
                <span style="color:#aaa;">微博视频占位 3</span>
            </div>
            <div class="video-info">
                <div class="video-title">🍳 美食Vlog：自己做晚饭</div>
                <div class="video-date">📅 2026.03.01</div>
                <div class="video-desc">厨房首秀，猜猜成功了吗？</div>
            </div>
        </div>
        <!-- 示例卡片4 -->
        <div class="video-card">
            <div class="video-player">
                <span style="color:#aaa;">微博视频占位 4</span>
            </div>
            <div class="video-info">
                <div class="video-title">🎤 演唱会后台准备</div>
                <div class="video-date">📅 2026.02.22</div>
                <div class="video-desc">上台前的紧张与兴奋</div>
            </div>
        </div>
        <!-- 继续添加更多卡片，每增加两个自动换行 -->
    </div>
</body>
</html>
