<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄子弘凡 · Vlog合集</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            padding: 10px;
        }
        h1 {
            color: #FF6B6B;
            border-bottom: 3px solid #FFD93D;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 28px;
        }
        /* 网格布局：电脑两列，手机一列 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 24px; }
        }
        .video-card {
            background: rgba(255, 241, 224, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(255,107,107,0.2);
            border: 1px solid rgba(255,255,255,0.5);
        }
        /* 视频容器固定宽高比 */
        .video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #2C1810;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD93D;
            font-size: 14px;
            overflow: hidden;
        }
        .video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
        }
        .video-info {
            padding: 15px;
        }
        .video-title {
            font-weight: bold;
            color: #2C1810;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .video-date {
            color: #FF8A5C;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .video-desc {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>📹 黄子弘凡 · 每周Vlog</h1>
    <div class="video-grid">
        <!-- 示例卡片1 -->
        <div class="video-card">
            <div class="video-player">
                <!-- 粘贴微博iframe代码 -->
                <span style="color:#aaa;">微博视频占位</span>
            </div>
            <div class="video-info">
                <div class="video-title">📽️ 这周的后台日常</div>
                <div class="video-date">📅 2026.03.15</div>
                <div class="video-desc">彩排小花絮，还有神秘嘉宾出现～</div>
            </div>
        </div>
        <!-- 示例卡片2 -->
        <div class="video-card">
            <div class="video-player">
                <span style="color:#aaa;">微博视频占位</span>
            </div>
            <div class="video-info">
                <div class="video-title">🎵 新歌试唱片段</div>
                <div class="video-date">📅 2026.03.08</div>
                <div class="video-desc">第一次在Vlog里唱新歌，听听看！</div>
            </div>
        </div>
        <!-- 更多卡片... -->
    </div>
</body>
</html>
