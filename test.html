<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素动态背景：星星·流星·云朵</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0f1e; /* 深色底衬，画布透明，但此背景不影响画布 */
        }
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;   /* 保持像素锐利 */
            background: transparent;
            pointer-events: none;          /* 鼠标穿透 */
            z-index: -1;
        }
        /* 示例内容（你的博客内容） */
        .content {
            position: relative;
            z-index: 1;
            padding: 2rem;
            color: white;
            text-shadow: 0 2px 5px black;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="content">
        <h1>✨ 新星星 + 流星 + 光影云朵 ✨</h1>
        <p>背景包含：动态四角星（✨形）、静态小星、流星、乌云/白云（有高光/光影）</p>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');

            // ========== 配置 ==========
            const CONFIG = {
                STAR_DYNAMIC_COUNT: 12,      // 动态大星星数量（✨形）
                STAR_STATIC_COUNT: 30,        // 静态小星星数量（点状）
                CLOUD_COUNT: 8,                // 云朵数量（包括乌云和白云）
                METEOR_COUNT: 2,                // 同时存在的流星数量（会不断重新生成）
                METEOR_SPEED: 3,                 // 流星速度（像素/帧）
                STAR_BASE_SIZE: 4,                // 每个“像素块”的放大倍数（星星大小）
                CLOUD_SPEED: 0.2,                 // 云朵水平移动速度
            };

            // ========== 星星帧数据（来自你发的React代码，转为偏移列表，中心为(16,16)）==========
            // 原始帧矩形左上角坐标 (x,y)，宽高4，中心(16,16)。计算偏移量 = (x-16, y-16)
            const rawFrames = [
                [], // 空帧
                [{x:14, y:14}], // 中心块
                [{x:14,y:14}, {x:14,y:10}, {x:14,y:18}, {x:10,y:14}, {x:18,y:14}],
                [{x:14,y:6}, {x:14,y:14}, {x:14,y:22}, {x:6,y:14}, {x:22,y:14}, {x:10,y:10}, {x:18,y:10}, {x:10,y:18}, {x:18,y:18}],
                [{x:14,y:2}, {x:14,y:6}, {x:14,y:14}, {x:14,y:22}, {x:14,y:26}, {x:2,y:14}, {x:6,y:14}, {x:22,y:14}, {x:26,y:14}, {x:8,y:8}, {x:20,y:8}, {x:8,y:20}, {x:20,y:20}],
                [{x:14,y:0}, {x:14,y:4}, {x:14,y:8}, {x:14,y:14}, {x:14,y:20}, {x:14,y:24}, {x:14,y:28}, {x:0,y:14}, {x:4,y:14}, {x:8,y:14}, {x:20,y:14}, {x:24,y:14}, {x:28,y:14}, {x:6,y:6}, {x:22,y:6}, {x:6,y:22}, {x:22,y:22}],
            ];

            // 转换为相对中心(16,16)的偏移量数组，每个元素为 [dx, dy]
            const starFrames = rawFrames.map(frame => 
                frame.map(r => [r.x - 16, r.y - 16])
            );
            // 最大帧索引
            const MAX_FRAME = starFrames.length - 1; // 5

            // ========== 动态星星数据 ==========
            let dynamicStars = [];
            for (let i = 0; i < CONFIG.STAR_DYNAMIC_COUNT; i++) {
                dynamicStars.push({
                    x: Math.random(),               // 相对位置 0..1
                    y: Math.random(),
                    phaseOffset: Math.random() * 2 * Math.PI, // 动画相位偏移（弧度）
                    speed: 0.5 + Math.random() * 0.8,          // 闪烁速度系数
                });
            }

            // ========== 静态小星星 ==========
            let staticStars = [];
            for (let i = 0; i < CONFIG.STAR_STATIC_COUNT; i++) {
                staticStars.push({
                    x: Math.random(),
                    y: Math.random(),
                    size: 1 + Math.floor(Math.random() * 2), // 1或2像素大小（放大后为size*scale）
                });
            }

            // ========== 云朵数据 ==========
            let clouds = [];
            for (let i = 0; i < CONFIG.CLOUD_COUNT; i++) {
                clouds.push({
                    x: Math.random() * 100,        // 初始水平位置（百分比，用于移动）
                    y: 0.2 + Math.random() * 0.6,   // 垂直位置 0.2~0.8
                    scale: 0.8 + Math.random() * 1.5, // 大小缩放
                    type: Math.random() > 0.5 ? 'dark' : 'light', // 乌云或白云
                    brightness: 0.6 + Math.random() * 0.4, // 基础亮度
                    speed: (0.1 + Math.random() * 0.3) * (Math.random() > 0.5 ? 1 : -1), // 移动方向
                });
            }

            // ========== 流星数据 ==========
            let meteors = [];
            function spawnMeteor() {
                return {
                    x: Math.random() * 100,          // 起始水平百分比
                    y: Math.random() * 30,            // 起始垂直百分比（上方区域）
                    length: 30 + Math.random() * 40,   // 流星轨迹长度（像素）
                    speed: CONFIG.METEOR_SPEED * (0.8 + Math.random() * 0.6),
                    angle: (Math.random() * 20 - 10) * Math.PI / 180, // 轻微角度偏移
                };
            }
            for (let i = 0; i < CONFIG.METEOR_COUNT; i++) {
                meteors.push(spawnMeteor());
            }

            // ========== 工具函数：绘制云朵 ==========
            function drawCloud(ctx, cx, cy, scale, type, brightness) {
                // cx,cy 是画布像素坐标
                const w = 60 * scale;
                const h = 30 * scale;
                // 主体颜色
                let baseColor, highlightColor;
                if (type === 'dark') {
                    baseColor = `rgba(70, 70, 90, ${brightness*0.8})`;
                    highlightColor = `rgba(140, 140, 170, ${brightness})`;
                } else {
                    baseColor = `rgba(220, 230, 240, ${brightness})`;
                    highlightColor = `rgba(255, 255, 255, ${brightness*0.9})`;
                }

                // 绘制三个椭圆组成云朵
                ctx.beginPath();
                ctx.ellipse(cx, cy, w*0.5, h*0.4, 0, 0, 2*Math.PI);
                ctx.ellipse(cx - w*0.3, cy - h*0.2, w*0.4, h*0.3, 0, 0, 2*Math.PI);
                ctx.ellipse(cx + w*0.3, cy + h*0.1, w*0.4, h*0.3, 0, 0, 2*Math.PI);
                ctx.fillStyle = baseColor;
                ctx.fill();

                // 高光（模拟阳光从左上角照下）
                ctx.save();
                ctx.shadowColor = 'rgba(255, 255, 200, 0.6)';
                ctx.shadowBlur = 15 * scale;
                ctx.beginPath();
                ctx.ellipse(cx - w*0.1, cy - h*0.15, w*0.2, h*0.15, 0, 0, 2*Math.PI);
                ctx.fillStyle = highlightColor;
                ctx.fill();
                ctx.restore();

                // 边缘光晕（阳光）
                ctx.save();
                ctx.shadowColor = 'rgba(255, 220, 150, 0.5)';
                ctx.shadowBlur = 20 * scale;
                ctx.beginPath();
                ctx.ellipse(cx + w*0.2, cy - h*0.1, w*0.3, h*0.2, 0, 0, 2*Math.PI);
                ctx.fillStyle = 'rgba(255, 240, 200, 0.3)';
                ctx.fill();
                ctx.restore();
            }

            // ========== 动画循环 ==========
            function draw() {
                const w = canvas.width = window.innerWidth;
                const h = canvas.height = window.innerHeight;

                // 清空为透明
                ctx.clearRect(0, 0, w, h);

                // ---------- 绘制云朵（背景层）----------
                clouds.forEach(cloud => {
                    // 移动
                    cloud.x += cloud.speed * CONFIG.CLOUD_SPEED;
                    if (cloud.x > 100 + 20) cloud.x = -20;
                    if (cloud.x < -20) cloud.x = 100 + 20;

                    const cx = (cloud.x / 100) * w;
                    const cy = cloud.y * h;
                    drawCloud(ctx, cx, cy, cloud.scale, cloud.type, cloud.brightness);
                });

                // ---------- 绘制静态小星星 ----------
                staticStars.forEach(star => {
                    const px = star.x * w;
                    const py = star.y * h;
                    const sz = star.size * 2; // 小星星画2x2或4x4方块
                    ctx.fillStyle = `rgba(255, 255, 200, ${0.6 + Math.random()*0.2})`; // 轻微随机亮度
                    ctx.fillRect(px - sz/2, py - sz/2, sz, sz);
                });

                // ---------- 绘制动态大星星（✨形）----------
                const time = Date.now() / 200; // 时间因子
                dynamicStars.forEach(star => {
                    // 计算当前帧索引（0-5-0循环）
                    const t = Math.sin(time * star.speed + star.phaseOffset);
                    // 映射到 0..1，再映射到帧索引 0..5..0
                    const normalized = (t + 1) / 2; // 0..1
                    let frameIndex;
                    if (normalized < 0.5) {
                        // 上升 0->5
                        frameIndex = Math.floor(normalized * 2 * MAX_FRAME);
                    } else {
                        // 下降 5->0
                        frameIndex = Math.floor((1 - normalized) * 2 * MAX_FRAME);
                    }
                    frameIndex = Math.min(frameIndex, MAX_FRAME);

                    const frame = starFrames[frameIndex];
                    if (!frame) return;

                    const centerX = star.x * w;
                    const centerY = star.y * h;
                    const scale = CONFIG.STAR_BASE_SIZE;

                    frame.forEach(([dx, dy]) => {
                        // dx,dy 是相对于中心(16,16)的偏移（以像素为单位）
                        const x = centerX + dx * scale;
                        const y = centerY + dy * scale;
                        ctx.fillStyle = '#FFE793'; // 金色
                        ctx.fillRect(x, y, scale, scale);
                    });
                });

                // ---------- 绘制流星 ----------
                meteors.forEach(meteor => {
                    // 流星位置 (百分比)
                    let xPercent = meteor.x;
                    let yPercent = meteor.y;
                    // 转换为像素
                    let x = (xPercent / 100) * w;
                    let y = (yPercent / 100) * h;

                    // 绘制流星轨迹（多个点）
                    const length = meteor.length;
                    const angle = meteor.angle;
                    const speed = meteor.speed;
                    for (let i = 0; i < 10; i++) {
                        const seg = i / 10;
                        const segX = x - Math.cos(angle) * length * seg;
                        const segY = y - Math.sin(angle) * length * seg;
                        const alpha = 0.8 * (1 - seg);
                        ctx.fillStyle = `rgba(255, 255, 210, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(segX, segY, 2 + seg*3, 0, 2*Math.PI);
                        ctx.fill();
                    }

                    // 更新流星位置
                    meteor.x += speed * Math.cos(angle) * 0.5;  // 水平移动
                    meteor.y += speed * Math.sin(angle) * 0.5;  // 垂直移动

                    // 如果飞出屏幕，重新生成
                    if (meteor.x > 120 || meteor.x < -20 || meteor.y > 120 || meteor.y < -20) {
                        Object.assign(meteor, spawnMeteor());
                    }
                });

                requestAnimationFrame(draw);
            }

            draw();
        })();
    </script>
</body>
</html>
