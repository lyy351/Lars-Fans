<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin:0; background:#0a0f1e; }
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
            background: transparent;
            pointer-events: none;
            z-index: -1;
        }
        .content {
            position: relative; z-index: 1; padding: 20px; color: white;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="content">
        <h1>✨ 精致星星 + 云朵 + 流星 ✨</h1>
        <p>1x1像素星星（大小不一），圆形云朵，简单流星</p>
    </div>
    <script>
        (function() {
            console.log('精致星星 + 云 + 流星 版启动');
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');

            // ---------- 星星部分（完全保留之前的精致版本）----------
            function generateStarFrames(maxOffset) {
                const frames = [];
                for (let frame = 0; frame <= maxOffset; frame++) {
                    const points = [];
                    for (let i = 0; i <= frame; i++) {
                        if (i === 0) {
                            points.push([0, 0]);
                        } else {
                            points.push([0, -i]); points.push([0, i]);
                            points.push([-i, 0]); points.push([i, 0]);
                        }
                    }
                    for (let i = 1; i <= frame; i++) {
                        points.push([-i, -i]); points.push([i, -i]);
                        points.push([-i, i]); points.push([i, i]);
                        if (i > 1) {
                            points.push([-i, -i+1]); points.push([i, -i+1]);
                            points.push([-i, i-1]); points.push([i, i-1]);
                            points.push([-i+1, -i]); points.push([i-1, -i]);
                            points.push([-i+1, i]); points.push([i-1, i]);
                        }
                    }
                    const unique = new Map();
                    points.forEach(([dx, dy]) => unique.set(`${dx},${dy}`, [dx, dy]));
                    frames.push(Array.from(unique.values()));
                }
                return frames;
            }
            const smallFrames = generateStarFrames(2);
            const mediumFrames = generateStarFrames(3);
            const largeFrames = generateStarFrames(4);
            const starTypes = [
                { frames: smallFrames, name: 'small' },
                { frames: mediumFrames, name: 'medium' },
                { frames: largeFrames, name: 'large' }
            ];

            const stars = [];
            const STAR_COUNT = 25;
            for (let i = 0; i < STAR_COUNT; i++) {
                const typeIdx = Math.floor(Math.random() * starTypes.length);
                const type = starTypes[typeIdx];
                stars.push({
                    x: Math.random(),
                    y: Math.random(),
                    phase: Math.random() * 2 * Math.PI,
                    speed: 0.3 + Math.random() * 0.7,
                    frames: type.frames,
                    maxFrame: type.frames.length - 1
                });
            }
            const staticStars = [];
            for (let i = 0; i < 50; i++) {
                staticStars.push({ x: Math.random(), y: Math.random() });
            }

            // ---------- 云朵数据（简化版：用圆形叠加）----------
            const clouds = [];
            const CLOUD_COUNT = 5;
            for (let i = 0; i < CLOUD_COUNT; i++) {
                clouds.push({
                    x: Math.random(),          // 相对位置 0-1
                    y: 0.2 + Math.random() * 0.6,
                    scale: 0.8 + Math.random() * 1.2, // 大小缩放
                    speed: (0.1 + Math.random() * 0.3) * (Math.random() > 0.5 ? 1 : -1), // 水平移动
                    type: Math.random() > 0.5 ? 'dark' : 'light'
                });
            }

            // 绘制云朵的函数（纯圆形，无阴影，兼容性好）
            function drawCloud(ctx, cx, cy, scale, type) {
                const baseRadius = 30 * scale;
                // 主体颜色
                let color;
                if (type === 'dark') {
                    color = 'rgba(70, 70, 90, 0.7)';
                } else {
                    color = 'rgba(220, 230, 240, 0.8)';
                }
                // 绘制三个叠加的圆
                ctx.beginPath();
                ctx.arc(cx, cy, baseRadius * 0.6, 0, 2 * Math.PI);
                ctx.arc(cx - baseRadius * 0.4, cy - baseRadius * 0.2, baseRadius * 0.5, 0, 2 * Math.PI);
                ctx.arc(cx + baseRadius * 0.4, cy + baseRadius * 0.1, baseRadius * 0.5, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();

                // 高光（更亮的小圆）
                ctx.beginPath();
                ctx.arc(cx - baseRadius * 0.2, cy - baseRadius * 0.15, baseRadius * 0.2, 0, 2 * Math.PI);
                ctx.fillStyle = type === 'dark' ? 'rgba(140, 140, 170, 0.6)' : 'rgba(255, 255, 255, 0.7)';
                ctx.fill();

                // 阳光边缘（淡黄色）
                ctx.beginPath();
                ctx.arc(cx + baseRadius * 0.3, cy - baseRadius * 0.1, baseRadius * 0.25, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 240, 200, 0.3)';
                ctx.fill();
            }

            // ---------- 流星数据（简化版）----------
            const meteors = [];
            const METEOR_COUNT = 2;
            function spawnMeteor() {
                return {
                    x: Math.random() * 100,      // 百分比 0-100
                    y: Math.random() * 30,
                    speed: 2 + Math.random() * 2,
                    angle: (Math.random() * 30 - 15) * Math.PI / 180, // -15°～15°
                    length: 40 + Math.random() * 40
                };
            }
            for (let i = 0; i < METEOR_COUNT; i++) {
                meteors.push(spawnMeteor());
            }

            // ---------- 动画循环 ----------
            function draw() {
                const w = canvas.width = window.innerWidth;
                const h = canvas.height = window.innerHeight;
                ctx.clearRect(0, 0, w, h);

                // 1. 先绘制云朵（背景层）
                clouds.forEach(cloud => {
                    // 水平移动
                    cloud.x += cloud.speed * 0.005; // 每帧移动一点点
                    if (cloud.x > 1.2) cloud.x = -0.2;
                    if (cloud.x < -0.2) cloud.x = 1.2;

                    const cx = cloud.x * w;
                    const cy = cloud.y * h;
                    drawCloud(ctx, cx, cy, cloud.scale, cloud.type);
                });

                // 2. 绘制静态小星星
                staticStars.forEach(s => {
                    ctx.fillStyle = `rgba(255, 255, 220, 0.7)`;
                    ctx.fillRect(s.x * w, s.y * h, 1, 1);
                });

                // 3. 绘制动态星星（核心）
                const time = Date.now() / 200;
                stars.forEach(star => {
                    const t = Math.sin(time * star.speed + star.phase);
                    const norm = (t + 1) / 2;
                    const maxF = star.maxFrame;
                    let frameIdx;
                    if (norm < 0.5) {
                        frameIdx = Math.floor((norm * 2) * maxF);
                    } else {
                        frameIdx = Math.floor((1 - (norm - 0.5) * 2) * maxF);
                    }
                    frameIdx = Math.min(frameIdx, maxF);
                    const frame = star.frames[frameIdx];
                    if (!frame) return;

                    const cx = star.x * w;
                    const cy = star.y * h;
                    frame.forEach(([dx, dy]) => {
                        ctx.fillStyle = '#FFD966';
                        ctx.fillRect(cx + dx, cy + dy, 1, 1);
                    });
                });

                // 4. 绘制流星（最后画，让它在最上层）
                meteors.forEach(meteor => {
                    // 转换百分比到像素
                    let x = (meteor.x / 100) * w;
                    let y = (meteor.y / 100) * h;
                    const angle = meteor.angle;
                    const length = meteor.length;

                    // 画轨迹（一串逐渐变淡的小圆）
                    for (let i = 0; i < 10; i++) {
                        const seg = i / 10;
                        const segX = x - Math.cos(angle) * length * seg;
                        const segY = y - Math.sin(angle) * length * seg;
                        const alpha = 0.6 * (1 - seg);
                        ctx.fillStyle = `rgba(255, 255, 210, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(segX, segY, 2 + seg * 2, 0, 2 * Math.PI);
                        ctx.fill();
                    }

                    // 更新位置（百分比坐标，避免像素单位混乱）
                    meteor.x += meteor.speed * Math.cos(angle) * 100 / w; // 转换成百分比增量
                    meteor.y += meteor.speed * Math.sin(angle) * 100 / h;

                    // 飞出屏幕重置
                    if (meteor.x > 120 || meteor.x < -20 || meteor.y > 120 || meteor.y < -20) {
                        const m = spawnMeteor();
                        meteor.x = m.x;
                        meteor.y = m.y;
                        meteor.speed = m.speed;
                        meteor.angle = m.angle;
                        meteor.length = m.length;
                    }
                });

                requestAnimationFrame(draw);
            }
            draw();
            console.log('动画启动，包含云朵和流星');
        })();
    </script>
</body>
</html>
