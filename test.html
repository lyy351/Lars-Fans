<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin:0; background:#0a0f1e; }
        #testCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: block;
            image-rendering: pixelated;
            background: transparent;
            pointer-events: none;
            z-index: -1;
        }
        .content {
            position: relative; z-index: 1; padding: 20px; color: white;
        }
    </style>
</head>
<body>
    <canvas id="testCanvas"></canvas>
    <div class="content">
        <h1>🔥 绝对星星测试</h1>
        <p>应该能看到一颗亮红色的星星在中央闪烁</p>
    </div>
    <script>
        console.log('=== 绝对星星测试开始 ===');
        const canvas = document.getElementById('testCanvas');
        if (!canvas) {
            console.error('canvas 元素未找到！');
        } else {
            console.log('canvas 找到，宽度：', canvas.width, '高度：', canvas.height);
        }
        const ctx = canvas.getContext('2d');
        console.log('ctx 获取成功');

        // 最简单的帧数据：只使用最大帧（完整星星）
        const starFrame = [
            [0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
            [0, -2], [0, 2], [-2, 0], [2, 0],
            [0, -3], [0, 3], [-3, 0], [3, 0],
            [0, -4], [0, 4], [-4, 0], [4, 0],
            [-1, -4], [1, -4], [-1, 4], [1, 4],
            [-2, -3], [2, -3], [-2, 3], [2, 3],
            [-3, -2], [3, -2], [-3, 2], [3, 2],
            [-4, -1], [4, -1], [-4, 1], [4, 1],
            [-2, -2], [2, -2], [-2, 2], [2, 2]
        ];
        console.log('星星帧像素点数量：', starFrame.length);

        // 星星参数：固定屏幕中心，大小2x2，亮红色
        const star = {
            cx: 0.5, // 相对坐标 0.5 即中心
            cy: 0.5,
            blockW: 2,
            blockH: 2,
            color: '#FF3333' // 亮红
        };

        function draw() {
            const w = canvas.width = window.innerWidth;
            const h = canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, w, h);

            // 绘制星星
            const cx = star.cx * w;
            const cy = star.cy * h;
            console.log('绘制星星，中心坐标：', cx, cy, '画布尺寸：', w, h);
            starFrame.forEach(([dx, dy], index) => {
                const x = cx + dx * star.blockW;
                const y = cy + dy * star.blockH;
                ctx.fillStyle = star.color;
                ctx.fillRect(x, y, star.blockW, star.blockH);
                // 可选：每10个点输出一次，避免刷屏
                if (index % 10 === 0) {
                    console.log(`  点 ${index}: dx=${dx}, dy=${dy}, 绘制位置 (${x}, ${y})`);
                }
            });

            requestAnimationFrame(draw);
        }
        draw();
        console.log('动画循环已启动');
    </script>
</body>
</html>
