<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin:0; background:#0a0f1e; }
        #testCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="testCanvas"></canvas>
    <div style="color:white; padding:20px; position:relative; z-index:1;">
        如果看到红色方块，说明画布正常
    </div>
    <script>
        const canvas = document.getElementById('testCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = 'red';
        ctx.fillRect(100, 100, 200, 200); // 红色方块
    </script>
</body>
</html>
