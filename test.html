<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin:0; background:#0a0f1e; }
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
            background: transparent;
            pointer-events: none;
            z-index: -1;
        }
        .content {
            position: relative; z-index: 1; padding: 20px; color: white;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="content">
        <h1>✨ 自适应大小的精致像素背景 ✨</h1>
        <p>星星、云朵、流星会随窗口大小缩放，不再显得小</p>
    </div>
    <script>
        (function() {
            console.log('自适应大小版启动');
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');

            // 缩放系数分母：数值越小，元素越大
            const SCALE_DENOMINATOR = 200; // 可调整，例如改为150元素会更大

            // ---------- 星星帧生成（逻辑像素坐标）----------
            function generateStarFrames(maxOffset) {
                const frames = [];
                for (let frame = 0; frame <= maxOffset; frame++) {
                    const points = [];
                    for (let i = 0; i <= frame; i++) {
                        if (i === 0) {
                            points.push([0, 0]);
                        } else {
                            points.push([0, -i]); points.push([0, i]);
                            points.push([-i, 0]); points.push([i, 0]);
                        }
                    }
                    for (let i = 1; i <= frame; i++) {
                        points.push([-i, -i]); points.push([i, -i]);
                        points.push([-i, i]); points.push([i, i]);
                        if (i > 1) {
                            points.push([-i, -i+1]); points.push([i, -i+1]);
                            points.push([-i, i-1]); points.push([i, i-1]);
                            points.push([-i+1, -i]); points.push([i-1, -i]);
                            points.push([-i+1, i]); points.push([i-1, i]);
                        }
                    }
                    const unique = new Map();
                    points.forEach(([dx, dy]) => unique.set(`${dx},${dy}`, [dx, dy]));
                    frames.push(Array.from(unique.values()));
                }
                return frames;
            }
            const smallFrames = generateStarFrames(2);
            const mediumFrames = generateStarFrames(3);
            const largeFrames = generateStarFrames(4);
            const starTypes = [
                { frames: smallFrames, name: 'small' },
                { frames: mediumFrames, name: 'medium' },
                { frames: largeFrames, name: 'large' }
            ];

            // 动态星星（逻辑位置）
            const stars = [];
            const STAR_COUNT = 25;
            for (let i = 0; i < STAR_COUNT; i++) {
                const typeIdx = Math.floor(Math.random() * starTypes.length);
                const type = starTypes[typeIdx];
                stars.push({
                    x: Math.random(),
                    y: Math.random(),
                    phase: Math.random() * 2 * Math.PI,
                    speed: 0.3 + Math.random() * 0.7,
                    frames: type.frames,
                    maxFrame: type.frames.length - 1
                });
            }
            // 静态小星星（逻辑位置）
            const staticStars = [];
            for (let i = 0; i < 50; i++) {
                staticStars.push({ x: Math.random(), y: Math.random() });
            }

            // ---------- 云朵数据（逻辑位置和逻辑大小）----------
            const clouds = [];
            const CLOUD_COUNT = 5;
            for (let i = 0; i < CLOUD_COUNT; i++) {
                clouds.push({
                    x: Math.random(),
                    y: 0.2 + Math.random() * 0.6,
                    scale: 0.8 + Math.random() * 1.2, // 逻辑缩放因子
                    speed: (0.1 + Math.random() * 0.3) * (Math.random() > 0.5 ? 1 : -1),
                    type: Math.random() > 0.5 ? 'dark' : 'light'
                });
            }

            // 绘制云朵（使用当前 pixelScale）
            function drawCloud(ctx, cx, cy, scale, type, pixelScale) {
                const baseRadius = 30 * scale * pixelScale; // 基础半径乘以缩放
                let color;
                if (type === 'dark') {
                    color = 'rgba(70, 70, 90, 0.7)';
                } else {
                    color = 'rgba(220, 230, 240, 0.8)';
                }
                ctx.beginPath();
                ctx.arc(cx, cy, baseRadius * 0.6, 0, 2 * Math.PI);
                ctx.arc(cx - baseRadius * 0.4, cy - baseRadius * 0.2, baseRadius * 0.5, 0, 2 * Math.PI);
                ctx.arc(cx + baseRadius * 0.4, cy + baseRadius * 0.1, baseRadius * 0.5, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(cx - baseRadius * 0.2, cy - baseRadius * 0.15, baseRadius * 0.2, 0, 2 * Math.PI);
                ctx.fillStyle = type === 'dark' ? 'rgba(140, 140, 170, 0.6)' : 'rgba(255, 255, 255, 0.7)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(cx + baseRadius * 0.3, cy - baseRadius * 0.1, baseRadius * 0.25, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 240, 200, 0.3)';
                ctx.fill();
            }

            // ---------- 流星数据（逻辑位置百分比）----------
            const meteors = [];
            const METEOR_COUNT = 2;
            function spawnMeteor() {
                return {
                    x: Math.random() * 100,
                    y: Math.random() * 30,
                    speed: 2 + Math.random() * 2,
                    angle: (Math.random() * 30 - 15) * Math.PI / 180,
                    length: 40 + Math.random() * 40
                };
            }
            for (let i = 0; i < METEOR_COUNT; i++) {
                meteors.push(spawnMeteor());
            }

            // ---------- 动画循环，每次重新计算缩放系数 ----------
            function draw() {
                const w = canvas.width = window.innerWidth;
                const h = canvas.height = window.innerHeight;

                // 计算基础缩放系数：基于窗口高度，确保元素大小合适
                const pixelScale = Math.max(1, Math.floor(h / SCALE_DENOMINATOR));

                ctx.clearRect(0, 0, w, h);

                // 1. 绘制云朵
                clouds.forEach(cloud => {
                    cloud.x += cloud.speed * 0.005;
                    if (cloud.x > 1.2) cloud.x = -0.2;
                    if (cloud.x < -0.2) cloud.x = 1.2;
                    const cx = cloud.x * w;
                    const cy = cloud.y * h;
                    drawCloud(ctx, cx, cy, cloud.scale, cloud.type, pixelScale);
                });

                // 2. 静态小星星（仍然是1像素，但用pixelScale放大？可以保持1像素，或者也缩放？为了视觉统一，也可以缩放）
                // 小星星我们让它保持1像素？或者也按比例缩放？为了不过于突兀，这里也缩放为 pixelScale x pixelScale 的点。
                staticStars.forEach(s => {
                    const px = s.x * w;
                    const py = s.y * h;
                    ctx.fillStyle = `rgba(255, 255, 220, 0.7)`;
                    ctx.fillRect(px, py, pixelScale, pixelScale); // 缩放小星星
                });

                // 3. 动态星星（核心）
                const time = Date.now() / 200;
                stars.forEach(star => {
                    const t = Math.sin(time * star.speed + star.phase);
                    const norm = (t + 1) / 2;
                    const maxF = star.maxFrame;
                    let frameIdx;
                    if (norm < 0.5) {
                        frameIdx = Math.floor((norm * 2) * maxF);
                    } else {
                        frameIdx = Math.floor((1 - (norm - 0.5) * 2) * maxF);
                    }
                    frameIdx = Math.min(frameIdx, maxF);
                    const frame = star.frames[frameIdx];
                    if (!frame) return;

                    const cx = star.x * w;
                    const cy = star.y * h;
                    frame.forEach(([dx, dy]) => {
                        ctx.fillStyle = '#FFD966';
                        // 每个逻辑像素点绘制为 pixelScale x pixelScale 的正方形，偏移也乘以 pixelScale
                        ctx.fillRect(cx + dx * pixelScale, cy + dy * pixelScale, pixelScale, pixelScale);
                    });
                });

                // 4. 流星
                meteors.forEach(meteor => {
                    let x = (meteor.x / 100) * w;
                    let y = (meteor.y / 100) * h;
                    const angle = meteor.angle;
                    const length = meteor.length * pixelScale; // 流星长度也缩放

                    for (let i = 0; i < 10; i++) {
                        const seg = i / 10;
                        const segX = x - Math.cos(angle) * length * seg;
                        const segY = y - Math.sin(angle) * length * seg;
                        const alpha = 0.6 * (1 - seg);
                        ctx.fillStyle = `rgba(255, 255, 210, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(segX, segY, (2 + seg * 2) * pixelScale, 0, 2 * Math.PI); // 点半径也缩放
                        ctx.fill();
                    }

                    // 更新位置（百分比）
                    meteor.x += meteor.speed * Math.cos(angle) * 100 / w;
                    meteor.y += meteor.speed * Math.sin(angle) * 100 / h;

                    if (meteor.x > 120 || meteor.x < -20 || meteor.y > 120 || meteor.y < -20) {
                        const m = spawnMeteor();
                        meteor.x = m.x;
                        meteor.y = m.y;
                        meteor.speed = m.speed;
                        meteor.angle = m.angle;
                        meteor.length = m.length;
                    }
                });

                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
</html>
