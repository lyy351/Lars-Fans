<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin:0; background:#0a0f1e; }
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
            background: transparent;
            pointer-events: none;
            z-index: -1;
        }
        .content {
            position: relative; z-index: 1; padding: 20px; color: white;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="content">
        <h1>✨ 瘦长四角星（多尺寸闪烁）</h1>
        <p>应该能看到不同大小的金色星星在闪烁</p>
    </div>
    <script>
        (function() {
            console.log('脚本启动');
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');

            // ========== 瘦长四角星帧数据（完整6帧）==========
            const starFrames = [
                [[0, 0]], // 帧0: 中心点
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0]], // 帧1: 十字
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
                 [0, -2], [0, 2], [-2, 0], [2, 0],
                 [-1, -1], [1, -1], [-1, 1], [1, 1]], // 帧2
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
                 [0, -2], [0, 2], [-2, 0], [2, 0],
                 [0, -3], [0, 3], [-3, 0], [3, 0],
                 [-1, -2], [1, -2], [-1, 2], [1, 2],
                 [-2, -1], [2, -1], [-2, 1], [2, 1]], // 帧3
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
                 [0, -2], [0, 2], [-2, 0], [2, 0],
                 [0, -3], [0, 3], [-3, 0], [3, 0],
                 [0, -4], [0, 4], [-4, 0], [4, 0],
                 [-1, -3], [1, -3], [-1, 3], [1, 3],
                 [-2, -2], [2, -2], [-2, 2], [2, 2],
                 [-3, -1], [3, -1], [-3, 1], [3, 1]], // 帧4
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
                 [0, -2], [0, 2], [-2, 0], [2, 0],
                 [0, -3], [0, 3], [-3, 0], [3, 0],
                 [0, -4], [0, 4], [-4, 0], [4, 0],
                 [-1, -4], [1, -4], [-1, 4], [1, 4],
                 [-2, -3], [2, -3], [-2, 3], [2, 3],
                 [-3, -2], [3, -2], [-3, 2], [3, 2],
                 [-4, -1], [4, -1], [-4, 1], [4, 1],
                 [-2, -2], [2, -2], [-2, 2], [2, 2]] // 帧5
            ];
            const MAX_FRAME = starFrames.length - 1; // 5

            // ========== 星星尺寸列表 ==========
            const sizes = [
                [1, 1],
                [2, 2],
                [3, 4],
                [2, 6]
            ];

            // ========== 生成星星数据 ==========
            const stars = [];
            const STAR_COUNT = 25; // 增加数量
            for (let i = 0; i < STAR_COUNT; i++) {
                const sizeIdx = Math.floor(Math.random() * sizes.length);
                stars.push({
                    x: Math.random(),
                    y: Math.random(),
                    phase: Math.random() * 2 * Math.PI,
                    speed: 0.3 + Math.random() * 0.7, // 慢一点更好看
                    w: sizes[sizeIdx][0],
                    h: sizes[sizeIdx][1]
                });
            }
            console.log('星星数量:', stars.length);

            // ========== 静态小星星（可选）==========
            const staticStars = [];
            for (let i = 0; i < 40; i++) {
                staticStars.push({
                    x: Math.random(),
                    y: Math.random()
                });
            }

            // ========== 动画循环 ==========
            function draw() {
                const w = canvas.width = window.innerWidth;
                const h = canvas.height = window.innerHeight;
                ctx.clearRect(0, 0, w, h);

                // 绘制静态小星星（白点）
                staticStars.forEach(s => {
                    ctx.fillStyle = `rgba(255,255,220,0.8)`;
                    ctx.fillRect(s.x * w, s.y * h, 1, 1);
                });

                // 绘制动态大星星
                const time = Date.now() / 200;
                stars.forEach(star => {
                    const t = Math.sin(time * star.speed + star.phase);
                    const norm = (t + 1) / 2; // 0-1
                    // 帧索引来回变化 0→5→0
                    let frameIdx;
                    if (norm < 0.5) {
                        frameIdx = Math.floor((norm * 2) * MAX_FRAME);
                    } else {
                        frameIdx = Math.floor((1 - (norm - 0.5) * 2) * MAX_FRAME);
                    }
                    frameIdx = Math.min(frameIdx, MAX_FRAME);
                    const frame = starFrames[frameIdx];
                    if (!frame) return;

                    const cx = star.x * w;
                    const cy = star.y * h;
                    const bw = star.w;
                    const bh = star.h;
                    frame.forEach(([dx, dy]) => {
                        ctx.fillStyle = '#FFD966'; // 金色
                        ctx.fillRect(cx + dx * bw, cy + dy * bh, bw, bh);
                    });
                });

                requestAnimationFrame(draw);
            }
            draw();
            console.log('动画启动');
        })();
    </script>
</body>
</html>
