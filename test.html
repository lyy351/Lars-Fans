<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 阶梯画廊 | 平行四边形卡片 | 滚轮推拉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #111010;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            overflow: hidden; /* 防止页面滚动，滚轮只控制3D场景 */
        }

        /* 卡片样式 (纯视觉，不负责定位) */
        .card {
            width: 300px;
            height: 200px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.32), 0 2px 8px rgba(0, 0, 0, 0.18);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
            /* 平行四边形变换：左边向下移 (正15°) */
            transform: skewY(15deg);
        }

        .card img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 遮罩层 (与背景融合) */
        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(transparent 40%, rgba(0, 0, 0, 0.55) 100%);
            z-index: 2;
        }

        /* 简单 logo */
        .logo {
            position: fixed;
            top: 24px;
            left: 28px;
            z-index: 10;
            opacity: 0.8;
            font-weight: 500;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            pointer-events: none;
        }

        /* 提示 */
        .hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            color: #ccc;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="logo">◈ 3D 画廊 ◈</div>
    <div class="hint">🖱️ 滚动滚轮 — 整体沿 Z 轴移动 | ✨ 悬停卡片 — 向右抽出</div>

    <!-- 引入 Three.js 核心库及扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 卡片数据 (与原一致) ---
        const cardsData = [
            { title: "雾中的孤独", query: "misty fjord morning fog dramatic moody landscape photography minimalist gray tones serene water reflection soft diffused light wide panoramic view fine art" },
            { title: "玻璃大教堂", query: "modern glass architecture building facade reflections abstract minimalist geometric patterns wide angle contemporary architecture photography clean sky fine art" },
            { title: "城市阴影", query: "tokyo night street rain reflections neon lights moody atmospheric wide urban photography cinematic dark dramatic japanese city panoramic" },
            { title: "最后的光芒", query: "portrait photography golden hour side light dramatic shadows moroccan desert warm tones wide shot atmospheric fine art cinematic landscape human figure" },
            { title: "矿物蓝", query: "iceland glacier lake blue ice abstract texture cold minimalist ethereal aerial water patterns wide panoramic monochromatic fine art nature photography" },
            { title: "具体的梦想", query: "brutalist concrete architecture dramatic shadows geometric forms wide minimalist modern building interior fine art photography stark light raw texture horizontal" },
            { title: "漂浮森林", query: "misty pine forest mountain ethereal fog dreamy soft light wide landscape fine art chinese nature photography layers depth serene minimal panoramic" },
            { title: "沙漠几何", query: "sahara desert sand dunes abstract curves shadows golden light minimalist wide geometric fine art landscape photography warm tones graphic panoramic" },
            { title: "雨后", query: "shanghai rainy street night reflections puddle mirror effect wide moody atmospheric urban photography lights blurred cinematic color street scene horizontal" },
            { title: "安静室", query: "japanese zen garden kyoto minimalist interior wide room soft window light serene traditional architecture fine art photography calm neutral tones horizontal" },
            { title: "态域", query: "abstract industrial macro photography geometric circles metallic textures dark moody conceptual fine art long exposure concentric patterns dramatic wide" },
            { title: "脉冲", query: "new york subway wide shot dramatic light cinematic moody street photography contemplative urban life fine art black and white horizontal scene" },
            { title: "盐滩", query: "uyuni salt flats bolivia mirror reflection sky minimalist dramatic wide landscape person silhouette infinite horizon fine art photography ethereal surreal" },
            { title: "骨白", query: "santorini white architecture blue dome minimalist mediterranean light wide angle geometric forms fine art travel photography greek island bright airy panoramic" }
        ];

        // --- 布局参数 ---
        const OFFSET_X = 48;      // X 方向间距 (向右)
        const OFFSET_Y = -40;     // Y 方向间距 (向下, 负值)
        const PULL_DIST = 200;    // 悬停抽出距离
        const RESET_DELAY = 150;  // 延迟复位时间 (ms)

        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111010); // 与 body 背景一致

        // 相机: 位置让整体居中，透视感适中
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        camera.lookAt(0, 0, 0);

        // WebGL 渲染器 (负责背景和辅助光效，但不渲染卡片)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x111010);
        document.body.appendChild(renderer.domElement);

        // CSS2D 渲染器 (负责卡片)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'auto'; // 让卡片可点击
        document.body.appendChild(labelRenderer.domElement);

        // 添加一点环境光 (不影响 CSS2D 对象，但为了背景视觉效果)
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);

        // --- 创建卡片组 (Group) 用于整体Z轴移动 ---
        const cardGroup = new THREE.Group();
        scene.add(cardGroup);

        // 存储每个卡片的 CSS2D 对象及原始变换信息
        const cardItems = [];

        // 生成卡片
        cardsData.forEach((card, index) => {
            // 创建卡片容器 div
            const div = document.createElement('div');
            div.className = 'card';
            
            // 添加图片
            const imgUrl = `https://readdy.ai/api/search-image?query=${encodeURIComponent(card.query)}&width=560&height=380&seq=${100 + index}&orientation=landscape`;
            const img = document.createElement('img');
            img.src = imgUrl;
            img.alt = card.title;
            img.loading = "lazy";
            div.appendChild(img);
            
            // 存储原始基础变换 (不含 translateX 抽出)
            const baseTransform = `skewY(15deg)`;
            div.style.transform = baseTransform;
            
            // 创建 CSS2DObject
            const css2dObj = new CSS2DObject(div);
            
            // 设置位置 (阶梯排列)
            const posX = index * OFFSET_X;
            const posY = index * OFFSET_Y;
            css2dObj.position.set(posX, posY, 0);
            cardGroup.add(css2dObj);
            
            // 存储相关数据用于交互
            cardItems.push({
                obj: css2dObj,
                div: div,
                baseTransform: baseTransform,
                resetTimer: null
            });
        });
        
        // 为了让卡片在相机视角中更自然，整体稍微调整位置使视觉中心在中间
        // 计算总宽度和高度中心，微调相机或组位置
        const totalCards = cardsData.length;
        const totalWidth = (totalCards - 1) * OFFSET_X;
        const totalHeight = (totalCards - 1) * Math.abs(OFFSET_Y);
        const centerX = totalWidth / 2;
        const centerY = totalHeight / 2;
        // 移动整个组使原点位于视觉中心附近 (因为相机看向原点)
        cardGroup.position.set(-centerX, -centerY, 0);
        
        // --- 交互：悬停抽出 + 延迟复位 ---
        cardItems.forEach(item => {
            const { div, baseTransform, obj } = item;
            
            // 鼠标进入
            div.addEventListener('mouseenter', () => {
                if (item.resetTimer) {
                    clearTimeout(item.resetTimer);
                    item.resetTimer = null;
                }
                // 抽出: 在原 transform 基础上增加向右平移
                div.style.transform = `${baseTransform} translateX(${PULL_DIST}px)`;
            });
            
            // 鼠标离开
            div.addEventListener('mouseleave', () => {
                item.resetTimer = setTimeout(() => {
                    div.style.transform = baseTransform;
                    item.resetTimer = null;
                }, RESET_DELAY);
            });
        });
        
        // --- 鼠标滚轮控制整体沿 Z 轴移动 (带缓动) ---
        let targetZ = 0;
        let currentZ = 0;
        
        window.addEventListener('wheel', (e) => {
            // 滚轮向下为正，增加 Z 值（靠近相机），向上为负
            const delta = e.deltaY > 0 ? -0.2 : 0.2;
            targetZ += delta;
            // 限制范围，避免穿模或太远
            targetZ = Math.min(3, Math.max(-3, targetZ));
        });
        
        // 动画循环：平滑移动 Z 轴并更新渲染
        function animate() {
            // 缓动
            currentZ += (targetZ - currentZ) * 0.1;
            cardGroup.position.z = currentZ;
            
            // 让相机轻微跟随? 不，保持相机固定，组移动即可。
            
            // 渲染 WebGL 背景 (为了保持和背景一致，其实CSS2D背景透明，但场景颜色已设置)
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // 窗口适配
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        animate();
    </script>
</body>
</html>
