<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin:0; background:#0a0f1e; }
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
            background: transparent;
            pointer-events: none;
            z-index: -1;
        }
        .content {
            position: relative; z-index: 1; padding: 20px; color: white;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="content"><h1>极简星星测试</h1><p>请查看控制台日志</p></div>
    <script>
        console.log('脚本开始');
        const canvas = document.getElementById('bgCanvas');
        if (!canvas) {
            console.error('canvas 未找到');
        } else {
            console.log('canvas 找到');
        }
        const ctx = canvas.getContext('2d');
        console.log('ctx 获取成功');

        // 瘦长四角星帧数据（简化，只有几帧）
        const starFrames = [
            [[0, 0]],  // 帧0: 中心
            [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0]], // 帧1: 十字
            [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0], [0, -2], [0, 2], [-2, 0], [2, 0]] // 帧2: 更长
        ];
        console.log('帧数据长度:', starFrames.length);

        // 生成5颗星星
        const stars = [];
        for (let i = 0; i < 5; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                phase: Math.random() * 2 * Math.PI,
                speed: 0.5 + Math.random() * 0.8
            });
        }
        console.log('星星数量:', stars.length);

        function draw() {
            const w = canvas.width = window.innerWidth;
            const h = canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, w, h);
            // console.log('draw 执行, w=' + w + ', h=' + h); // 可选，取消注释会每秒刷很多条

            const time = Date.now() / 200;
            stars.forEach((star, index) => {
                const t = Math.sin(time * star.speed + star.phase);
                const norm = (t + 1) / 2; // 0-1
                const frameIdx = Math.floor(norm * (starFrames.length - 1));
                const frame = starFrames[frameIdx];
                if (!frame) {
                    console.warn('帧不存在:', frameIdx);
                    return;
                }
                const cx = star.x * w;
                const cy = star.y * h;
                frame.forEach(([dx, dy]) => {
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(cx + dx, cy + dy, 1, 1);
                });
            });
            requestAnimationFrame(draw);
        }
        draw();
        console.log('动画循环已启动');
    </script>
</body>
</html>
