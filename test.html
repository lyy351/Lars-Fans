<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瘦长四角星 ✨ 像素背景</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0f1e;
        }
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            background: transparent;
            pointer-events: none;
            z-index: -1;
        }
        .content {
            position: relative;
            z-index: 1;
            padding: 2rem;
            color: white;
            text-shadow: 0 2px 5px black;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="content">
        <h1>✨ 瘦长四角星 + 流星 + 云朵 ✨</h1>
        <p>星星更尖长，大小适中，不松散</p>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('bgCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            // ========== 配置 ==========
            const CONFIG = {
                STAR_DYNAMIC_COUNT: 15,      // 动态星星数量
                STAR_STATIC_COUNT: 40,        // 静态小星星
                CLOUD_COUNT: 6,                // 云朵数量
                METEOR_COUNT: 2,
                METEOR_SPEED: 2,
                STAR_SIZE: 1,                   // 每个像素点的大小（1 = 1x1 像素）
                CLOUD_SPEED: 0.15,
            };

            // ========== 瘦长四角星帧数据（每帧的像素偏移列表，相对于中心(0,0)）==========
            // 设计思路：主轴上下延伸更长，左右稍短，对角线辅助，让星形尖锐
            // 帧0: 只有中心
            // 帧1: 中心 + 上下左右四个方向各1步
            // 帧2: 延伸到2步，并加入对角线
            // 帧3: 延伸到3步（主轴更远）
            // 帧4: 延伸到4步（上下更长）
            // 帧5: 最大尺寸（主轴4步，对角线适当）
            // 之后收缩，实现从点到星再回点的动画

            const starFrames = [
                // 帧0: 中心点
                [[0, 0]],

                // 帧1: 中心 + 四方向1步
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0]],

                // 帧2: 延伸2步，加入对角线
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
                 [0, -2], [0, 2], [-2, 0], [2, 0],
                 [-1, -1], [1, -1], [-1, 1], [1, 1]],

                // 帧3: 主轴3步，对角线2步
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
                 [0, -2], [0, 2], [-2, 0], [2, 0],
                 [0, -3], [0, 3], [-3, 0], [3, 0],
                 [-1, -2], [1, -2], [-1, 2], [1, 2],
                 [-2, -1], [2, -1], [-2, 1], [2, 1]],

                // 帧4: 主轴4步，对角线3步
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
                 [0, -2], [0, 2], [-2, 0], [2, 0],
                 [0, -3], [0, 3], [-3, 0], [3, 0],
                 [0, -4], [0, 4], [-4, 0], [4, 0],
                 [-1, -3], [1, -3], [-1, 3], [1, 3],
                 [-2, -2], [2, -2], [-2, 2], [2, 2],
                 [-3, -1], [3, -1], [-3, 1], [3, 1]],

                // 帧5: 最大，主轴4步，对角线4步（更饱满的尖角）
                [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0],
                 [0, -2], [0, 2], [-2, 0], [2, 0],
                 [0, -3], [0, 3], [-3, 0], [3, 0],
                 [0, -4], [0, 4], [-4, 0], [4, 0],
                 [-1, -4], [1, -4], [-1, 4], [1, 4],
                 [-2, -3], [2, -3], [-2, 3], [2, 3],
                 [-3, -2], [3, -2], [-3, 2], [3, 2],
                 [-4, -1], [4, -1], [-4, 1], [4, 1],
                 [-2, -2], [2, -2], [-2, 2], [2, 2]]
            ];

            const MAX_FRAME = starFrames.length - 1; // 5

            // ========== 动态星星数据 ==========
            let dynamicStars = [];
            for (let i = 0; i < CONFIG.STAR_DYNAMIC_COUNT; i++) {
                dynamicStars.push({
                    x: Math.random(),
                    y: Math.random(),
                    phaseOffset: Math.random() * 2 * Math.PI,
                    speed: 0.6 + Math.random() * 0.7,
                });
            }

            // ========== 静态小星星 ==========
            let staticStars = [];
            for (let i = 0; i < CONFIG.STAR_STATIC_COUNT; i++) {
                staticStars.push({
                    x: Math.random(),
                    y: Math.random(),
                });
            }

            // ========== 云朵数据（略，保持之前版本）==========
            let clouds = [];
            for (let i = 0; i < CONFIG.CLOUD_COUNT; i++) {
                clouds.push({
                    x: Math.random() * 100,
                    y: 0.2 + Math.random() * 0.6,
                    scale: 0.8 + Math.random() * 1.5,
                    type: Math.random() > 0.5 ? 'dark' : 'light',
                    brightness: 0.6 + Math.random() * 0.4,
                    speed: (0.1 + Math.random() * 0.3) * (Math.random() > 0.5 ? 1 : -1),
                });
            }

            // ========== 流星数据（像素坐标）==========
            let meteors = [];
            function spawnMeteor() {
                return {
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight * 0.3,
                    length: 30 + Math.random() * 40,
                    speed: CONFIG.METEOR_SPEED * (0.8 + Math.random() * 0.6),
                    angle: (Math.random() * 20 - 10) * Math.PI / 180,
                };
            }
            for (let i = 0; i < CONFIG.METEOR_COUNT; i++) {
                meteors.push(spawnMeteor());
            }

            // ========== 绘制云朵（同前）==========
            function drawCloud(ctx, cx, cy, scale, type, brightness) {
                const w = 60 * scale;
                const h = 30 * scale;
                let baseColor, highlightColor;
                if (type === 'dark') {
                    baseColor = `rgba(70, 70, 90, ${brightness * 0.8})`;
                    highlightColor = `rgba(140, 140, 170, ${brightness})`;
                } else {
                    baseColor = `rgba(220, 230, 240, ${brightness})`;
                    highlightColor = `rgba(255, 255, 255, ${brightness * 0.9})`;
                }

                ctx.beginPath();
                ctx.ellipse(cx, cy, w * 0.5, h * 0.4, 0, 0, 2 * Math.PI);
                ctx.ellipse(cx - w * 0.3, cy - h * 0.2, w * 0.4, h * 0.3, 0, 0, 2 * Math.PI);
                ctx.ellipse(cx + w * 0.3, cy + h * 0.1, w * 0.4, h * 0.3, 0, 0, 2 * Math.PI);
                ctx.fillStyle = baseColor;
                ctx.fill();

                ctx.save();
                ctx.shadowColor = 'rgba(255, 255, 200, 0.6)';
                ctx.shadowBlur = 15 * scale;
                ctx.beginPath();
                ctx.ellipse(cx - w * 0.1, cy - h * 0.15, w * 0.2, h * 0.15, 0, 0, 2 * Math.PI);
                ctx.fillStyle = highlightColor;
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.shadowColor = 'rgba(255, 220, 150, 0.5)';
                ctx.shadowBlur = 20 * scale;
                ctx.beginPath();
                ctx.ellipse(cx + w * 0.2, cy - h * 0.1, w * 0.3, h * 0.2, 0, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 240, 200, 0.3)';
                ctx.fill();
                ctx.restore();
            }

            // ========== 动画循环 ==========
            function draw() {
                const w = canvas.width = window.innerWidth;
                const h = canvas.height = window.innerHeight;
                ctx.clearRect(0, 0, w, h);

                // 绘制云朵
                clouds.forEach(cloud => {
                    cloud.x += cloud.speed * CONFIG.CLOUD_SPEED;
                    if (cloud.x > 100 + 20) cloud.x = -20;
                    if (cloud.x < -20) cloud.x = 100 + 20;
                    const cx = (cloud.x / 100) * w;
                    const cy = cloud.y * h;
                    drawCloud(ctx, cx, cy, cloud.scale, cloud.type, cloud.brightness);
                });

                // 绘制静态小星星（随机白点）
                staticStars.forEach(star => {
                    const px = star.x * w;
                    const py = star.y * h;
                    ctx.fillStyle = `rgba(255, 255, 220, ${0.5 + Math.random()*0.3})`;
                    ctx.fillRect(px, py, 1, 1);
                });

                // 绘制动态大星星（瘦长四角星）
                const time = Date.now() / 200;
                dynamicStars.forEach(star => {
                    const t = Math.sin(time * star.speed + star.phaseOffset);
                    const normalized = (t + 1) / 2; // 0-1
                    // 帧索引在0-5-0之间循环
                    let frameIndex;
                    if (normalized < 0.5) {
                        frameIndex = Math.floor((normalized * 2) * MAX_FRAME);
                    } else {
                        frameIndex = Math.floor((1 - (normalized - 0.5) * 2) * MAX_FRAME);
                    }
                    frameIndex = Math.min(frameIndex, MAX_FRAME);
                    const frame = starFrames[frameIndex];
                    if (!frame) return;

                    const cx = star.x * w;
                    const cy = star.y * h;
                    const size = CONFIG.STAR_SIZE; // 1
                    frame.forEach(([dx, dy]) => {
                        ctx.fillStyle = '#FFE68F'; // 柔和金色
                        ctx.fillRect(cx + dx, cy + dy, size, size);
                    });
                });

                // 绘制流星
                meteors.forEach(meteor => {
                    const length = meteor.length;
                    const angle = meteor.angle;
                    for (let i = 0; i < 10; i++) {
                        const seg = i / 10;
                        const segX = meteor.x - Math.cos(angle) * length * seg;
                        const segY = meteor.y - Math.sin(angle) * length * seg;
                        const alpha = 0.8 * (1 - seg);
                        ctx.fillStyle = `rgba(255, 255, 210, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(segX, segY, 2 + seg * 2, 0, 2 * Math.PI);
                        ctx.fill();
                    }

                    meteor.x += Math.cos(angle) * meteor.speed;
                    meteor.y += Math.sin(angle) * meteor.speed;

                    if (meteor.x > w + 100 || meteor.x < -100 || meteor.y > h + 100 || meteor.y < -100) {
                        Object.assign(meteor, spawnMeteor());
                    }
                });

                requestAnimationFrame(draw);
            }

            draw();
        })();
    </script>
</body>
</html>
