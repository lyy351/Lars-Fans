<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin:0; background:#0a0f1e; }
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
            background: transparent;
            pointer-events: none;
            z-index: -1;
        }
        .content {
            position: relative; z-index: 1; padding: 20px; color: white;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="content"><h1>仅星星测试</h1></div>
    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        console.log('脚本开始执行'); // 控制台输出

        // 星星帧数据（简化版）
        const rawFrames = [
            [],
            [{x:14,y:14}],
            [{x:14,y:14}, {x:14,y:10}, {x:14,y:18}, {x:10,y:14}, {x:18,y:14}],
            [{x:14,y:6}, {x:14,y:14}, {x:14,y:22}, {x:6,y:14}, {x:22,y:14}, {x:10,y:10}, {x:18,y:10}, {x:10,y:18}, {x:18,y:18}],
            [{x:14,y:2}, {x:14,y:6}, {x:14,y:14}, {x:14,y:22}, {x:14,y:26}, {x:2,y:14}, {x:6,y:14}, {x:22,y:14}, {x:26,y:14}, {x:8,y:8}, {x:20,y:8}, {x:8,y:20}, {x:20,y:20}],
            [{x:14,y:0}, {x:14,y:4}, {x:14,y:8}, {x:14,y:14}, {x:14,y:20}, {x:14,y:24}, {x:14,y:28}, {x:0,y:14}, {x:4,y:14}, {x:8,y:14}, {x:20,y:14}, {x:24,y:14}, {x:28,y:14}, {x:6,y:6}, {x:22,y:6}, {x:6,y:22}, {x:22,y:22}]
        ];
        const starFrames = rawFrames.map(f => f.map(p => [p.x-16, p.y-16]));

        // 生成5颗动态星星
        const stars = [];
        for (let i=0; i<5; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                phase: Math.random()*2*Math.PI,
                speed: 0.5+Math.random()*0.8
            });
        }

        function draw() {
            const w = canvas.width = window.innerWidth;
            const h = canvas.height = window.innerHeight;
            ctx.clearRect(0,0,w,h);

            const time = Date.now()/200;
            stars.forEach(s => {
                const t = Math.sin(time*s.speed + s.phase);
                const norm = (t+1)/2; // 0-1
                const frameIdx = Math.min(Math.floor(norm * 5), 5); // 0-5
                const frame = starFrames[frameIdx];
                if (!frame) return;

                const cx = s.x * w;
                const cy = s.y * h;
                frame.forEach(([dx,dy]) => {
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(cx + dx*4, cy + dy*4, 4, 4);
                });
            });

            requestAnimationFrame(draw);
        }
        draw();
        console.log('动画启动');
    </script>
</body>
</html>
